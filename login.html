<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e0530c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Connexion – TOP Musique Niger</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#09090b;--card:#16161c;--card-h:#1e1e26;
  --border:rgba(255,255,255,.08);--border-md:rgba(255,255,255,.14);
  --accent:#e0530c;--ag:rgba(224,83,12,.3);--ad:rgba(224,83,12,.12);
  --gold:#c9a84c;--gg:rgba(201,168,76,.3);--gd:rgba(201,168,76,.12);
  --green:#0c7e40;--blue:#5b8dee;--bd:rgba(91,141,238,.12);
  --red:#e05252;--rd:rgba(224,82,82,.12);
  --text:#f0ece4;--t2:#8a8790;--t3:#4a4850;
  --radius:12px;--rlg:18px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:var(--bg);font-family:'Instrument Sans',sans-serif;color:var(--text);
  display:flex;align-items:center;justify-content:center;padding:1.2rem;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.07),transparent 55%);}
.wrap{width:100%;max-width:420px;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.logo-row{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:1.8rem;}
.logo-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--gold),#7a4f0a);
  display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;
  font-size:1.8rem;font-weight:800;color:#07070a;box-shadow:0 6px 24px var(--gg);}
.logo-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold),#f0e8d0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-flag{display:flex;border-radius:3px;overflow:hidden;width:42px;height:7px;}
.logo-flag div{flex:1;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);
  padding:1.6rem 1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.card-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:.2rem;}
.card-sub{font-size:.82rem;color:var(--t2);text-align:center;margin-bottom:1.3rem;}
.demo-strip{display:flex;gap:.5rem;margin-bottom:1.1rem;}
.demo-btn{flex:1;padding:.55rem .5rem;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);
  background:var(--card-h);transition:all .2s;text-align:center;}
.demo-btn.artist:hover{border-color:rgba(224,83,12,.4);background:var(--ad);}
.demo-btn.listener:hover{border-color:rgba(91,141,238,.4);background:var(--bd);}
.db-icon{font-size:1.1rem;margin-bottom:.15rem;}
.db-label{font-size:.65rem;font-weight:700;color:var(--t2);}
.db-role{font-size:.58rem;color:var(--t3);}
.divider{display:flex;align-items:center;gap:.7rem;margin:.9rem 0;}
.div-line{flex:1;height:1px;background:var(--border);}
.div-txt{font-size:.7rem;color:var(--t3);}
.field{margin-bottom:.85rem;}
.field-label{font-size:.68rem;font-weight:700;color:var(--t2);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:.38rem;display:block;}
.fw{position:relative;}
.fi{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.75rem;pointer-events:none;transition:color .2s;}
.fw:focus-within .fi{color:var(--gold);}
.field-input{width:100%;padding:.72rem 1rem .72rem 2.5rem;background:var(--card-h);
  border:1.5px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:.88rem;outline:none;transition:all .22s;}
.field-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gd);}
.field-input::placeholder{color:var(--t3);}
.pwd-eye{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.78rem;cursor:pointer;}
.error-box{display:none;align-items:center;gap:.5rem;padding:.6rem .9rem;
  background:var(--rd);border:1px solid rgba(224,82,82,.25);border-radius:10px;
  font-size:.8rem;color:var(--red);margin-bottom:.8rem;}
.error-box.show{display:flex;}
.api-indicator{display:flex;align-items:center;gap:.4rem;font-size:.68rem;margin-bottom:.9rem;
  padding:.4rem .7rem;border-radius:8px;}
.api-indicator.online {background:rgba(12,126,64,.12);color:var(--green);border:1px solid rgba(12,126,64,.25);}
.api-indicator.offline{background:rgba(201,168,76,.1); color:var(--gold); border:1px solid rgba(201,168,76,.25);}
.api-indicator .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.api-indicator.online  .dot{background:var(--green);box-shadow:0 0 6px var(--green);}
.api-indicator.offline .dot{background:var(--gold);}
.forgot{text-align:right;font-size:.74rem;color:var(--t3);margin-bottom:.9rem;cursor:pointer;transition:color .2s;}
.forgot:hover{color:var(--t2);}
.submit-btn{width:100%;height:50px;border-radius:100px;
  background:linear-gradient(135deg,var(--gold),#9a6c10);color:#07070a;
  font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;
  border:none;cursor:pointer;transition:all .25s;box-shadow:0 4px 18px var(--gg);
  display:flex;align-items:center;justify-content:center;gap:.5rem;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px var(--gg);}
.submit-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#07070a;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.oauth-btn{width:100%;height:43px;border-radius:100px;background:var(--card-h);border:1.5px solid var(--border);
  color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.5rem;}
.oauth-btn:hover{border-color:var(--border-md);}
.card-footer{text-align:center;margin-top:1rem;font-size:.8rem;color:var(--t2);}
.card-footer a{color:var(--gold);font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon">T</div>
    <div class="logo-name">TOP Musique Niger</div>
    <div class="logo-flag"><div style="background:#e0530c;"></div><div style="background:#f5f0e8;"></div><div style="background:#0c7e40;"></div></div>
  </div>

  <div class="card">
    <div class="card-title">Connexion</div>
    <div class="card-sub">Accédez à votre espace musical</div>

    <!-- Indicateur API -->
    <div class="api-indicator" id="apiStatus">
      <div class="dot"></div><span id="apiStatusTxt">Vérification du serveur…</span>
    </div>

    <!-- Démo rapide -->
    <div style="font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;">Tester l'application →</div>
    <div class="demo-strip">
      <div class="demo-btn listener" onclick="demoLogin('listener')">
        <div class="db-icon">🎧</div>
        <div class="db-label">Démo Auditeur</div>
        <div class="db-role">Favoris · Explore · Playlists</div>
      </div>
      <div class="demo-btn artist" onclick="demoLogin('artist')">
        <div class="db-icon">🎤</div>
        <div class="db-label">Démo Artiste</div>
        <div class="db-role">Publier · Stats · Profil</div>
      </div>
    </div>

    <div class="divider"><div class="div-line"></div><div class="div-txt">ou se connecter</div><div class="div-line"></div></div>

    <div class="error-box" id="errBox"><i class="fas fa-circle-xmark"></i><span id="errMsg">Erreur</span></div>

    <div class="field">
      <label class="field-label">Email</label>
      <div class="fw"><i class="fas fa-envelope fi"></i>
        <input class="field-input" id="emailInp" type="email" placeholder="vous@exemple.com" oninput="clearErr()">
      </div>
    </div>
    <div class="field">
      <label class="field-label">Mot de passe</label>
      <div class="fw"><i class="fas fa-lock fi"></i>
        <input class="field-input" id="pwdInp" type="password" placeholder="Votre mot de passe" oninput="clearErr()" onkeydown="if(event.key==='Enter')doLogin()">
        <span class="pwd-eye" onclick="toggleEye(this)"><i class="fas fa-eye"></i></span>
      </div>
    </div>
    <div class="forgot" onclick="alert('Un lien de réinitialisation sera envoyé à votre email.')">Mot de passe oublié ?</div>

    <button class="submit-btn" id="loginBtn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <i class="fas fa-right-to-bracket" id="loginIco"></i>
      <span id="loginLbl">Se connecter</span>
    </button>

    <div class="divider"><div class="div-line"></div><div class="div-txt">ou avec</div><div class="div-line"></div></div>
    <div class="oauth-btn" onclick="oauthLogin('google')">
      <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </div>
    <div class="card-footer">Pas encore de compte ? <a onclick="location.href='register.html'">Créer un compte</a></div>
  </div>
</div>

<script src="app.js"></script>
<script src="tmn-api.js"></script>
<script>
const $=id=>document.getElementById(id);
if(TMN.isLoggedIn()) location.href='home.html';

// Vérification ping API au chargement
async function checkAPI(){
  const el=$('apiStatus'), txt=$('apiStatusTxt');
  try{
    const r=await fetch('http://localhost:3000/health',{signal:AbortSignal.timeout(3000)});
    if(r.ok){ el.className='api-indicator online'; txt.textContent='Serveur connecté – données en direct'; }
    else throw new Error();
  }catch{
    el.className='api-indicator offline'; txt.textContent='Mode démo – backend non démarré';
  }
}
checkAPI();

function clearErr(){ $('errBox').classList.remove('show'); }
function toggleEye(btn){ const i=$('pwdInp');const s=i.type==='password';i.type=s?'text':'password';btn.querySelector('i').className=s?'fas fa-eye-slash':'fas fa-eye'; }

function setLoading(on){
  $('spinner').style.display=on?'block':'none';
  $('loginIco').style.display=on?'none':'';
  $('loginLbl').textContent=on?'Connexion…':'Se connecter';
  $('loginBtn').disabled=on;
}
function showErr(msg){ $('errMsg').textContent=msg; $('errBox').classList.add('show'); }

async function doLogin(){
  const email=$('emailInp').value.trim(), pwd=$('pwdInp').value;
  if(!email||!pwd){ showErr('Remplissez tous les champs'); return; }
  setLoading(true);
  try{
    const data = await TMNAPI.auth.login({ email, password: pwd });
    redirect(data.user);
  }catch(err){
    showErr(err.message || 'Email ou mot de passe incorrect');
    setLoading(false);
  }
}

async function demoLogin(role){
  setLoading(true);
  const demos={
    listener:{ email:'moussa@tmn.ne',    password:'demo1234' },
    artist:  { email:'fatoumata@tmn.ne', password:'demo1234' },
  };
  try{
    const data = await TMNAPI.auth.login(demos[role]);
    redirect(data.user);
  }catch{
    setLoading(false);
  }
}

function oauthLogin(provider){
  alert(`Connexion ${provider} non encore disponible en production. Utilisez email/mot de passe.`);
}

function redirect(user){
  location.href = (user.role==='artist') ? 'home.html' : 'home.html';
}
</script>
</body>
</html>
