<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e0530c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lecteur – TOP Musique Niger</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --c1:#e0530c; --c2:#c9a84c;
  --bg:#080809; --card:#18181c; --card-h:#202026;
  --border:rgba(255,255,255,.07); --border-md:rgba(255,255,255,.13);
  --text:#f0ece4; --text-2:#9a9698; --text-3:#55535a;
  --radius:14px; --radius-lg:22px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);
  user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}

/* ══ DYNAMIC BG ══ */
#dynBg{
  position:fixed;inset:0;z-index:0;
  transition:background 1.4s ease;
}
#dynBg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(8,8,9,.3) 0%,rgba(8,8,9,.85) 60%,#080809 100%);
}
/* Grain */
#dynBg::before{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  opacity:.5;
}

/* ══ LAYOUT ══ */
.player-wrap{
  position:relative;z-index:1;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);
  max-width:480px;margin:0 auto;
  overflow:hidden;
}

/* ══ TOP BAR ══ */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1.2rem .5rem;flex-shrink:0;
}
.tb-btn{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid var(--border);
  color:var(--text-2);font-size:.88rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.tb-btn:hover{color:var(--text);background:rgba(255,255,255,.13);}
.tb-center{text-align:center;}
.tb-label{font-size:.68rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;}
.tb-source{font-size:.82rem;font-weight:600;color:var(--text-2);}

/* ══ COVER AREA ══ */
.cover-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:1rem 2rem;position:relative;min-height:0;
  touch-action:pan-y;
}

/* Swipe hint */
.swipe-hint{
  position:absolute;bottom:.5rem;left:50%;transform:translateX(-50%);
  font-size:.64rem;color:var(--text-3);display:flex;align-items:center;gap:.35rem;
  opacity:.6;
  animation:hintFade 3s ease 2s forwards;
}
@keyframes hintFade{to{opacity:0;}}

/* Cover disc */
.cover-disc-wrap{
  position:relative;
  width:min(65vw,270px);height:min(65vw,270px);
  flex-shrink:0;
}
.cover-disc{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 6px rgba(255,255,255,.06),0 0 0 12px rgba(255,255,255,.03);
  transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .4s ease;
}
.cover-disc.spinning{animation:spin 18s linear infinite;}
.cover-disc.paused{animation-play-state:paused;}
.cover-disc.bounce{animation:discBounce .3s ease;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes discBounce{0%,100%{transform:scale(1)}50%{transform:scale(.94)}}
.disc-bg{
  position:absolute;inset:0;font-size:9rem;
  display:flex;align-items:center;justify-content:center;
  filter:blur(22px);opacity:.45;transform:scale(1.2);
}
.disc-em{position:relative;z-index:1;font-size:4.5rem;transition:transform .3s;}
/* Vinyl grooves */
.disc-grooves{
  position:absolute;inset:0;border-radius:50%;pointer-events:none;
  background:repeating-radial-gradient(circle,transparent,transparent 10px,rgba(0,0,0,.08) 10px,rgba(0,0,0,.08) 11px);
}
/* Center hole */
.disc-hole{
  position:absolute;width:20px;height:20px;border-radius:50%;
  background:var(--bg);border:3px solid rgba(255,255,255,.15);z-index:2;
}
/* Tonearm */
.tonearm{
  position:absolute;top:-10px;right:-20px;
  width:80px;height:80px;pointer-events:none;z-index:3;
  transition:transform .5s cubic-bezier(.22,1,.36,1);
  transform-origin:70px 10px;
}
.tonearm.on-disc{transform:rotate(-28deg);}
.tonearm.off-disc{transform:rotate(-50deg);}
.tonearm svg{width:100%;height:100%;}

/* Cover glow ring */
.cover-glow{
  position:absolute;inset:-24px;border-radius:50%;
  background:radial-gradient(circle,var(--c1),transparent 70%);
  opacity:.2;filter:blur(20px);
  animation:glowPulse 2s ease-in-out infinite;pointer-events:none;
}
@keyframes glowPulse{0%,100%{opacity:.18;transform:scale(1)}50%{opacity:.28;transform:scale(1.06)}}

/* ══ VISUALIZER ══ */
.visualizer{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:min(70vw,290px);height:40px;
  display:flex;align-items:flex-end;justify-content:center;gap:3px;
  opacity:.5;pointer-events:none;
}
.viz-bar{
  width:4px;border-radius:3px 3px 0 0;
  background:linear-gradient(180deg,var(--c1),var(--c2));
  min-height:3px;opacity:.25;
  transition:height .08s ease, opacity .12s ease;
}

/* ══ TRACK INFO ══ */
.track-info{
  padding:.6rem 1.4rem .4rem;flex-shrink:0;
  display:flex;align-items:center;gap:.7rem;
}
.ti-text{flex:1;min-width:0;}
.ti-title{
  font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.1;
}
.ti-artist{font-size:.88rem;color:var(--text-2);margin-top:.18rem;}
.ti-right{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex-shrink:0;}
.ti-like{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:var(--text-3);font-size:.92rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.ti-like:hover{color:#e05252;}
.ti-like.liked{color:#e05252;background:rgba(224,82,82,.12);border-color:rgba(224,82,82,.3);}
.ti-rating{display:flex;gap:1px;}
.ti-rating i{font-size:.62rem;color:var(--c2);}
.ti-rating i.e{color:var(--text-3);}

/* ══ PROGRESS ══ */
.progress-section{padding:.3rem 1.4rem .2rem;flex-shrink:0;}
.prog-track{
  height:4px;border-radius:2px;
  background:rgba(255,255,255,.1);
  position:relative;cursor:pointer;margin-bottom:.55rem;
}
.prog-fill{
  height:100%;border-radius:2px;width:0%;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  transition:width .25s linear;position:relative;
}
.prog-fill::after{
  content:'';position:absolute;right:-6px;top:-4px;
  width:12px;height:12px;border-radius:50%;
  background:#fff;box-shadow:0 0 8px var(--c1);
  opacity:0;transition:opacity .2s;
}
.prog-track:hover .prog-fill::after{opacity:1;}
.prog-times{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-3);}

/* ══ CONTROLS ══ */
.controls{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem 1.2rem .5rem;flex-shrink:0;
}
.ctrl-btn{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:var(--text-2);cursor:pointer;
  transition:all .2s;
}
.ctrl-btn:hover{color:var(--text);}
.ctrl-btn.active{color:var(--c1);}
.ctrl-prev,.ctrl-next{
  width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:var(--text);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.ctrl-prev:hover,.ctrl-next:hover{background:rgba(255,255,255,.12);}
.ctrl-play{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  color:#fff;font-size:1.4rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .25s;
  box-shadow:0 6px 24px rgba(0,0,0,.4),0 0 0 0 rgba(224,83,12,.3);
}
.ctrl-play:hover{transform:scale(1.06);}
.ctrl-play:active{transform:scale(.96);}
.ctrl-play.playing{
  animation:playGlow 2s ease-in-out infinite;
}
@keyframes playGlow{
  0%,100%{box-shadow:0 6px 24px rgba(0,0,0,.4),0 0 0 0 rgba(224,83,12,.3);}
  50%{box-shadow:0 6px 24px rgba(0,0,0,.4),0 0 0 12px rgba(224,83,12,.0);}
}

/* ══ VOLUME ══ */
.volume-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.1rem 1.4rem .4rem;flex-shrink:0;
}
.vol-icon{font-size:.82rem;color:var(--text-3);}
.vol-track{
  flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.1);cursor:pointer;position:relative;
}
.vol-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  width:75%;transition:width .1s;
}
/* Import MP3 button */
.import-btn{
  width:28px;height:28px;border-radius:50%;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;color:var(--text-3);
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  transition:all .2s;
}
.import-btn:hover{color:var(--c2);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.1);}
/* Buffering spinner on play button */
.ctrl-play.buffering::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--c2);
  animation:spin .8s linear infinite;
}
/* spin defined above */

/* ══ TABS ══ */
.tabs-bar{
  display:flex;gap:0;padding:0 1.2rem;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.tab-btn{
  flex:1;padding:.55rem .5rem;
  font-size:.78rem;font-weight:600;color:var(--text-3);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;text-align:center;
}
.tab-btn.active{color:var(--c1);border-color:var(--c1);}
.tab-btn:hover:not(.active){color:var(--text-2);}

/* ══ TAB PANELS ══ */
.tab-panels{
  flex:1;overflow:hidden;min-height:0;position:relative;
}
.tab-panel{
  position:absolute;inset:0;overflow-y:auto;padding:.9rem 1.2rem;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  opacity:0;pointer-events:none;transform:translateY(6px);
  transition:opacity .25s,transform .25s;
}
.tab-panel.active{opacity:1;pointer-events:all;transform:translateY(0);}

/* Queue panel */
.queue-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.6rem .75rem;border-radius:var(--radius);
  cursor:pointer;transition:all .18s;margin-bottom:.3rem;
}
.queue-item:hover{background:rgba(255,255,255,.05);}
.queue-item.current{background:rgba(var(--c1),.08);background:rgba(224,83,12,.08);}
.qi-num{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--text-3);min-width:18px;text-align:center;flex-shrink:0;}
.qi-playing-bars{display:none;gap:2px;align-items:flex-end;height:14px;min-width:18px;justify-content:center;flex-shrink:0;}
.queue-item.current .qi-num{display:none;}
.queue-item.current .qi-playing-bars{display:flex;}
.qpb{width:3px;border-radius:1px;background:var(--c1);}
.qpb1{height:8px;animation:bA .7s ease-in-out infinite alternate;}
.qpb2{height:14px;animation:bA .7s ease-in-out .12s infinite alternate;}
.qpb3{height:6px;animation:bA .7s ease-in-out .24s infinite alternate;}
@keyframes bA{to{transform:scaleY(.25)}}
.qi-cover{
  width:42px;height:42px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(224,83,12,.3),rgba(201,168,76,.2));
}
.qi-cb{position:absolute;inset:0;font-size:2.5rem;display:flex;align-items:center;justify-content:center;filter:blur(8px);opacity:.35;transform:scale(1.4);}
.qi-ce{position:relative;z-index:1;font-size:1.1rem;}
.qi-info{flex:1;min-width:0;}
.qi-title{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qi-sub{font-size:.7rem;color:var(--text-2);}
.qi-dur{font-size:.68rem;color:var(--text-3);flex-shrink:0;}

/* Lyrics panel */
.lyric-line{
  font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:600;
  line-height:1.7;color:var(--text-3);cursor:pointer;
  transition:all .35s;padding:.12rem 0;
}
.lyric-line.active{
  color:var(--text);font-size:1.25rem;
  filter:drop-shadow(0 0 12px var(--c1));
}
.lyric-line.past{color:rgba(240,236,228,.35);}
.lyric-empty{text-align:center;padding:2rem;color:var(--text-3);font-size:.88rem;line-height:1.7;}

/* Info panel */
.info-section{margin-bottom:1.2rem;}
.info-label{font-size:.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;}
.info-value{font-size:.9rem;font-weight:500;}
.info-tags{display:flex;flex-wrap:wrap;gap:.4rem;}
.info-tag{padding:.28rem .7rem;border-radius:100px;font-size:.76rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--text-2);}
.info-tag.genre{background:rgba(224,83,12,.1);color:var(--c1);border-color:rgba(224,83,12,.25);}
.info-tag.region{background:rgba(201,168,76,.1);color:var(--c2);border-color:rgba(201,168,76,.25);}
.rating-stars{display:flex;align-items:center;gap:.35rem;}
.rating-stars i{font-size:1.1rem;color:var(--c2);cursor:pointer;transition:transform .15s;}
.rating-stars i:hover{transform:scale(1.2);}
.rating-stars i.e{color:var(--text-3);}
.rating-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--c2);margin-left:.3rem;}
.share-row{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.3rem;}
.share-btn{display:flex;align-items:center;gap:.4rem;padding:.5rem .9rem;border-radius:100px;font-size:.78rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--text-2);cursor:pointer;transition:all .2s;}
.share-btn:hover{color:var(--text);border-color:var(--border-md);}
.share-btn.primary{background:rgba(224,83,12,.1);color:var(--c1);border-color:rgba(224,83,12,.3);}
.share-btn.primary:hover{background:var(--c1);color:#fff;}

/* ══ SLEEP TIMER BADGE ══ */
.sleep-badge{
  position:fixed;top:.9rem;left:50%;transform:translateX(-50%);
  background:rgba(17,17,19,.97);border:1px solid var(--border-md);
  border-radius:100px;padding:.35rem .9rem;font-size:.72rem;color:var(--text-2);
  display:flex;align-items:center;gap:.4rem;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.sleep-badge.show{opacity:1;pointer-events:all;}
.sleep-badge i{color:var(--c2);}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:1.5rem;left:50%;
  transform:translateX(-50%) translateY(60px);opacity:0;
  background:var(--card);border:1px solid var(--border-md);color:var(--text);
  padding:.7rem 1.4rem;border-radius:100px;font-size:.84rem;
  display:flex;align-items:center;gap:.5rem;
  box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:999;
  transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .3s;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.success i{color:#4caf7d;}
#toast.info i{color:var(--c2);}
#toast.error i{color:#e05252;}

/* ══════════════════════════════
   ÉGALISEUR 5 BANDES
══════════════════════════════ */
#eqOverlay{
  position:fixed;inset:0;z-index:9998;
  background:rgba(8,8,9,.75);backdrop-filter:blur(12px);
  display:none;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
#eqOverlay.open{ display:flex; }
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#eqPanel{
  width:100%;max-width:480px;
  background:linear-gradient(180deg,#1a1a22 0%,#111118 100%);
  border-radius:26px 26px 0 0;
  border-top:1px solid rgba(255,255,255,.1);
  padding:1.2rem 1.4rem calc(env(safe-area-inset-bottom,0px)+1.5rem);
  animation:slideUp2 .32s cubic-bezier(.22,1,.36,1);
  position:relative;
}
@keyframes slideUp2{from{transform:translateY(100%)}to{transform:translateY(0)}}

.eq-handle{
  width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);
  margin:0 auto .9rem;
}
.eq-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;
}
.eq-title{font-family:'Syne',sans-serif;font-size:.98rem;font-weight:800;display:flex;align-items:center;gap:.5rem;}
.eq-title span{font-size:.62rem;font-weight:700;padding:.14rem .5rem;border-radius:100px;
  background:rgba(201,168,76,.15);color:#c9a84c;border:1px solid rgba(201,168,76,.25);}
.eq-actions{display:flex;gap:.45rem;}
.eq-action-btn{padding:.32rem .75rem;border-radius:100px;font-size:.72rem;font-weight:700;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#9a9698;transition:all .2s;}
.eq-action-btn:hover{color:#f0ece4;border-color:rgba(255,255,255,.25);}
.eq-action-btn.accent{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.3);color:#c9a84c;}

/* Presets row */
.eq-presets{
  display:flex;gap:.38rem;overflow-x:auto;scrollbar-width:none;
  margin-bottom:1.3rem;padding-bottom:.1rem;
}
.eq-presets::-webkit-scrollbar{display:none;}
.eq-preset{
  flex-shrink:0;padding:.3rem .72rem;border-radius:100px;font-size:.7rem;font-weight:700;
  cursor:pointer;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:#55535a;transition:all .2s;white-space:nowrap;
}
.eq-preset:hover{color:#f0ece4;border-color:rgba(255,255,255,.2);}
.eq-preset.active{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.35);color:#c9a84c;}

/* Sliders zone */
.eq-sliders{
  display:flex;align-items:flex-end;gap:.5rem;
  height:220px;padding:0 .2rem;margin-bottom:.9rem;position:relative;
}
/* Grille dB */
.eq-grid{
  position:absolute;left:0;right:0;top:14px;bottom:46px;
  display:flex;flex-direction:column;justify-content:space-between;pointer-events:none;
}
.eq-grid-line{
  height:1px;background:rgba(255,255,255,.045);position:relative;
}
.eq-grid-label{
  position:absolute;right:calc(100% + 6px);top:-7px;
  font-size:.52rem;color:#35333a;font-family:'DM Mono',monospace;white-space:nowrap;
}

/* Individual band */
.eq-band{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:.3rem;
  height:100%;position:relative;justify-content:flex-end;
}
/* Vertical slider track */
.eq-band-track{
  position:relative;flex:1;width:100%;display:flex;justify-content:center;
  cursor:ns-resize;
}
.eq-band-rail{
  width:3px;height:100%;border-radius:2px;background:rgba(255,255,255,.07);position:relative;overflow:visible;
}
/* Fill (positive = above center, negative = below) */
.eq-band-fill{
  position:absolute;left:0;right:0;border-radius:2px;transition:top .05s,height .05s,background .25s;
}
/* Thumb */
.eq-band-thumb{
  position:absolute;left:50%;transform:translateX(-50%);
  width:18px;height:18px;border-radius:50%;cursor:grab;z-index:2;
  border:2.5px solid;box-shadow:0 0 10px rgba(0,0,0,.5);
  transition:transform .1s,box-shadow .1s;background:#1a1a22;
}
.eq-band-thumb:active,.eq-band-thumb.dragging{cursor:grabbing;transform:translateX(-50%) scale(1.25);}
.eq-band-thumb:hover{box-shadow:0 0 14px var(--band-clr,#c9a84c)99;}
/* Value label */
.eq-band-val{
  font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;
  min-width:32px;text-align:center;transition:color .2s;
}
/* Name label */
.eq-band-name{font-size:.6rem;font-weight:700;color:#55535a;text-align:center;margin-top:.15rem;}
/* Freq label */
.eq-band-freq{font-size:.52rem;color:#35333a;font-family:'DM Mono',monospace;margin-bottom:.2rem;}

/* Spectrum viz */
.eq-spectrum{

.eq-spec-bar{

  transition:height .07s ease;
}

<script>
/* ══════════════════════════════

══════════════════════════════ */
const SONGS = [

     lyrics:["Minuit à Niamey les esprits dansent","Mon flow coule comme le fleuve sombre","Night flow, je glisse sur le beat","Comme une pirogue sur le Niger","Les néons de la ville me guident","À travers les rues de mon quartier","Night flow, la nuit est mon studio","Je compose jusqu'à l'aurore","Mes mots sont des poèmes de nuit","Tissés dans l'obscurité dorée","Night flow, je règne sur les ondes","Quand la ville dort je crée"],
     info:{year:2024,label:'TMN Records',producer:'NiameyBeats',bpm:88}},
    {id:4, title:'AGADEZ SOUL',   artist:'RABIATOU',  genre:'Gospel',   region:'Agadez',   emoji:'🥁', duration:240, rating:4.8,
     lyrics:["","","","","","","","","","","",""],
     info:{year:2025,label:'Gospel Niger',producer:'AgadezSound',bpm:75}},
    {id:5, title:'MARADI VIBES',  artist:'IBRAHIM',   genre:'Afrobeat', region:'Maradi',   emoji:'🎹', duration:235, rating:4.6,
     lyrics:["","","","","","","","","","","",""],
     info:{year:2024,label:'TMN Records',producer:'MaradiFlow',bpm:104}},
    {id:6, title:'TANGAZA',       artist:'AMINATOU',  genre:'R&B',      region:'Tahoua',   emoji:'🎶', duration:200, rating:4.5,
     lyrics:["","","","","","","","","","","",""],
     info:{year:2025,label:'Tahoua Music',producer:'SoulNiger',bpm:82}},
];

/* Couleurs dynamiques par chanson */
const SONG_COLORS = [
    ['#e0530c','#c9a84c'],
    ['#1a1aff','#00b4d8'],
    ['#0c7e40','#c9a84c'],
    ['#9c27b0','#e91e63'],
    ['#e0530c','#ff5722'],
    ['#00838f','#5b8dee'],
];

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const $=id=>document.getElementById(id);
let currentIdx  = 0;
let isPlaying   = false;
let isShuffle   = false;
let repeatMode  = 0; // 0=none 1=all 2=one
let progress    = 0;
let progTimer   = null;   // fallback timer (mode démo sans MP3)
let volume      = 0.75;
let isLiked     = false;
let userRating  = 0;
let lyricsTimer = null;
let sleepTimer  = null;
let sleepMins   = 0;
let vizTimer    = null;
let touchStartX = 0;

/* ══════════════════════════════════════════════════════
   WEB AUDIO ENGINE
══════════════════════════════════════════════════════ */
const AudioEngine = (() => {
    let audioCtx    = null;
    let sourceNode  = null;
    let gainNode    = null;
    let analyser    = null;
    let eqFilters   = [];         // 5 BiquadFilterNodes
    let mediaEl     = null;
    let rafId       = null;
    let _vol        = 0.75;
    let hasRealAudio = false;

    /* ── EQ bands: Sub-bass · Bass · Mid · Presence · Brilliance ── */
    const EQ_BANDS = [
        { freq:  80,  type:'lowshelf',   label:'Graves',    icon:'🔊', color:'#e0530c' },
        { freq:  320, type:'peaking',    label:'Basses',    icon:'🥁', color:'#c9a84c' },
        { freq: 1000, type:'peaking',    label:'Médiums',   icon:'🎸', color:'#5b8dee' },
        { freq: 3500, type:'peaking',    label:'Présence',  icon:'🎤', color:'#0c7e40' },
        { freq:10000, type:'highshelf',  label:'Aigus',     icon:'✨', color:'#9c27b0' },
    ];

    /* ── Initialisation paresseuse du contexte (doit être dans un geste user) ── */
    function _initCtx() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // ── Signal chain: source → EQ (5 filtres en série) → gain → analyser → sortie ──
            // 1. Créer les 5 filtres BiquadFilter
            eqFilters = EQ_BANDS.map(band => {
                const f     = audioCtx.createBiquadFilter();
                f.type      = band.type;
                f.frequency.value = band.freq;
                f.Q.value   = band.type === 'peaking' ? 1.4 : 0.7;
                f.gain.value = 0;  // 0 dB par défaut (flat)
                return f;
            });

            // 2. Chaîner les filtres entre eux
            for (let i = 0; i < eqFilters.length - 1; i++) {
                eqFilters[i].connect(eqFilters[i + 1]);
            }

            // 3. Sortie de la chaîne EQ → gain → analyser → destination
            gainNode = audioCtx.createGain();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.82;

            eqFilters[eqFilters.length - 1].connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            gainNode.gain.value = _vol;

        } catch(e) { console.warn('AudioContext non disponible', e); }
    }

    /* ── Crée/récupère l'élément <audio> ── */
    function _getMediaEl() {
        if (mediaEl) return mediaEl;
        mediaEl = document.createElement('audio');
        mediaEl.crossOrigin = 'anonymous';
        mediaEl.preload = 'metadata';
        mediaEl.volume  = _vol;
        // Événements natifs
        mediaEl.addEventListener('timeupdate', _onTimeUpdate);
        mediaEl.addEventListener('ended',      _onEnded);
        mediaEl.addEventListener('loadedmetadata', _onMeta);
        mediaEl.addEventListener('error',      _onError);
        mediaEl.addEventListener('waiting',    () => _setBuffering(true));
        mediaEl.addEventListener('canplay',    () => _setBuffering(false));
        document.body.appendChild(mediaEl);
        return mediaEl;
    }

    function _connectMedia() {
        if (!audioCtx || !mediaEl || sourceNode) return;
        try {
            sourceNode = audioCtx.createMediaElementSource(mediaEl);
            // Source → premier filtre EQ → … → gainNode → analyser → sortie
            const firstNode = eqFilters.length ? eqFilters[0] : gainNode;
            sourceNode.connect(firstNode);
        } catch(e) {}
    }

    function _onTimeUpdate() {
        if (!mediaEl || !hasRealAudio) return;
        progress = Math.floor(mediaEl.currentTime);
        updateProgress();
        updateLyricsHighlight();
        // Minuterie sommeil
        if (sleepTimer && sleepMins > 0) {
            sleepMins = Math.max(0, sleepMins - (1/60));
            $('sleepLabel') && ($('sleepLabel').textContent = fmtTime(Math.ceil(sleepMins*60)));
            if (sleepMins <= 0) {
                clearInterval(sleepTimer); sleepTimer = null;
                $('sleepBadge')?.classList.remove('show');
                pause(); showToast('Minuterie terminée — bonne nuit 🌙', 'info');
            }
        }
    }

    function _onEnded() {
        if (repeatMode === 2) { mediaEl.currentTime = 0; mediaEl.play(); }
        else nextSong();
    }

    function _onMeta() {
        if (!mediaEl) return;
        const dur = Math.round(mediaEl.duration) || SONGS[currentIdx]?.duration || 0;
        SONGS[currentIdx].duration = dur;
        $('progTotal').textContent = fmtTime(dur);
    }

    function _onError(e) {
        hasRealAudio = false;
        // Bascule en mode simulation si le fichier est inaccessible
        console.info('Audio non disponible — mode simulation activé');
        _showDemoMode(true);
        if (isPlaying) _startFakeProgress();
    }

    function _setBuffering(on) {
        $('playBtn')?.classList.toggle('buffering', on);
    }

    function _showDemoMode(show) {
        let badge = document.getElementById('demoBadge');
        if (!badge) {
            badge = document.createElement('div');
            badge.id = 'demoBadge';
            badge.style.cssText = 'position:fixed;top:calc(env(safe-area-inset-top,0px)+56px);left:50%;transform:translateX(-50%);background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);color:#c9a84c;font-size:.65rem;font-weight:700;padding:.22rem .7rem;border-radius:100px;z-index:9999;white-space:nowrap;display:none;backdrop-filter:blur(8px);';
            badge.textContent = '🎵 Mode simulation — importez un MP3 pour écouter';
            document.body.appendChild(badge);
        }
        badge.style.display = show ? 'block' : 'none';
    }

    /* ── Simulation de progression (mode sans fichier) ── */
    function _startFakeProgress() {
        clearInterval(progTimer);
        progTimer = setInterval(() => {
            if (!isPlaying) return;
            progress++;
            updateProgress();
            updateLyricsHighlight();
            const dur = SONGS[currentIdx]?.duration || 210;
            if (progress >= dur) {
                clearInterval(progTimer);
                if (repeatMode === 2) { progress = 0; _startFakeProgress(); }
                else nextSong();
            }
        }, 1000);
    }
    function _stopFakeProgress() { clearInterval(progTimer); }

    /* ═══════════════════════════
       API PUBLIQUE
    ═══════════════════════════ */

    /** Charge un morceau depuis une URL (ou null pour le mode démo) */
    async function load(song) {
        _initCtx();
        const el = _getMediaEl();
        hasRealAudio = false;
        _showDemoMode(false);
        _stopFakeProgress();

        const url = song.audio_url || song.src || null;
        if (url) {
            el.src = url;
            el.load();
            hasRealAudio = true;
            _connectMedia();
        } else {
            // Aucun fichier — mode simulation
            el.src = '';
            hasRealAudio = false;
            _showDemoMode(true);
            progress = 0;
        }
    }

    /** Lecture */
    async function play() {
        _initCtx();
        if (audioCtx?.state === 'suspended') await audioCtx.resume();
        if (hasRealAudio && mediaEl) {
            try {
                await mediaEl.play();
                _stopFakeProgress();
            } catch(e) {
                // Autoplay bloqué — l'utilisateur doit interagir
                showToast('Appuyez sur ▶ pour démarrer', 'info');
                return;
            }
        } else {
            _startFakeProgress();
        }
        _startVizRaf();
    }

    /** Pause */
    function pause() {
        if (hasRealAudio && mediaEl) mediaEl.pause();
        _stopFakeProgress();
        _stopVizRaf();
    }

    /** Seek (0..1) */
    function seek(pct) {
        const dur = SONGS[currentIdx]?.duration || 210;
        const t   = Math.floor(pct * dur);
        if (hasRealAudio && mediaEl && !isNaN(mediaEl.duration)) {
            mediaEl.currentTime = pct * mediaEl.duration;
        }
        progress = t;
        updateProgress();
        updateLyricsHighlight();
    }

    /** Volume (0..1) */
    function setVol(v) {
        _vol = Math.max(0, Math.min(1, v));
        if (gainNode) gainNode.gain.setTargetAtTime(_vol, audioCtx.currentTime, 0.05);
        if (mediaEl)  mediaEl.volume = _vol;
        $('volFill').style.width = (_vol * 100) + '%';
        // Icône mute
        const icon = document.querySelector('.vol-icon.fa-volume-low, .vol-icon.fa-volume-xmark');
        if (icon) icon.className = `fas ${_vol === 0 ? 'fa-volume-xmark' : 'fa-volume-low'} vol-icon`;
    }

    /** Importe un fichier local MP3/WAV de l'utilisateur */
    function importFile(file) {
        if (!file) return;
        const allowed = ['audio/mpeg','audio/mp3','audio/wav','audio/ogg','audio/flac','audio/aac'];
        if (!allowed.includes(file.type) && !file.name.match(/\.(mp3|wav|ogg|flac|aac|m4a)$/i)) {
            showToast('Format non supporté — MP3, WAV, OGG, FLAC', 'error'); return;
        }
        _initCtx();
        const el = _getMediaEl();
        const blobUrl = URL.createObjectURL(file);
        el.src = blobUrl;
        el.load();
        hasRealAudio = true;
        _connectMedia();
        _showDemoMode(false);
        _stopFakeProgress();
        showToast(`🎵 "${file.name}" chargé`, 'success');
        // Mise à jour du titre dans la song actuelle
        if (!SONGS[currentIdx].audio_url) {
            SONGS[currentIdx].audio_url = blobUrl;
            SONGS[currentIdx]._localFile = file.name;
        }
        // Lance la lecture
        if (isPlaying) {
            el.play().catch(()=>{});
            _startVizRaf();
        }
    }

    /* ── Visualiseur fréquentiel réel ── */
    function _startVizRaf() {
        _stopVizRaf();
        const bars   = document.querySelectorAll('.viz-bar');
        const count  = bars.length;
        const data   = new Uint8Array(analyser ? analyser.frequencyBinCount : count);
        let fakeTick = 0;

        function frame() {
            rafId = requestAnimationFrame(frame);
            if (analyser && hasRealAudio) {
                analyser.getByteFrequencyData(data);
                bars.forEach((b, i) => {
                    const v = data[Math.floor(i * data.length / count)] / 255;
                    const h = 4 + v * 34;
                    b.style.height = h + 'px';
                    b.style.opacity = 0.4 + v * 0.6;
                });
            } else {
                // Simulation organique quand pas de vrai audio
                fakeTick++;
                bars.forEach((b, i) => {
                    const wave  = Math.sin(fakeTick * 0.05 + i * 0.45) * 0.5 + 0.5;
                    const noise = Math.random() * 0.25;
                    const bass  = i < 4 ? Math.abs(Math.sin(fakeTick * 0.08)) * 0.4 : 0;
                    const h = isPlaying ? 4 + (wave + noise + bass) * 26 : 4;
                    b.style.height = h + 'px';
                    b.style.opacity = isPlaying ? 0.45 + wave * 0.55 : 0.25;
                });
            }
        }
        frame();
    }
    function _stopVizRaf() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        document.querySelectorAll('.viz-bar').forEach(b => {
            b.style.height = '4px'; b.style.opacity = '0.25';
        });
    }

    function getIsReal() { return hasRealAudio; }
    function getEl()     { return mediaEl; }
    function getCtx()    { return audioCtx; }

    /* ── EQ : ajuste le gain d'une bande (index 0-4, gain en dB -12..+12) ── */
    function setEQ(bandIndex, gainDb) {
        if (!eqFilters[bandIndex]) return;
        const clamped = Math.max(-12, Math.min(12, gainDb));
        eqFilters[bandIndex].gain.setTargetAtTime(clamped, audioCtx?.currentTime || 0, 0.01);
    }

    /* ── Reset toutes les bandes à 0 dB ── */
    function resetEQ() {
        eqFilters.forEach(f => {
            if (audioCtx) f.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            else f.gain.value = 0;
        });
    }

    /* ── Applique un preset (tableau de 5 gains dB) ── */
    function applyPreset(gains) {
        gains.forEach((g, i) => setEQ(i, g));
    }

    function getBands()  { return EQ_BANDS; }
    function getGains()  { return eqFilters.map(f => f.gain.value); }

    return { load, play, pause, seek, setVol, importFile, getIsReal, getEl, getCtx,
             setEQ, resetEQ, applyPreset, getBands, getGains };
})();

/* ══════════════════════════════
   INIT
══════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
    buildViz();

    // 1. Morceau passé via sessionStorage (depuis top.html, home.html…)
    const stored = sessionStorage.getItem('tmn_current_song');
    if (stored) {
        try {
            const parsed = JSON.parse(stored);
            // Injecte en tête de liste si pas déjà présent
            const exists = SONGS.findIndex(s => String(s.id) === String(parsed.id) || s.title === parsed.title);
            if (exists >= 0) { currentIdx = exists; }
            else {
                SONGS.unshift({
                    id:       parsed.id || 0,
                    title:    parsed.title     || 'Morceau',
                    artist:   parsed.artist_name || parsed.artist || 'Artiste',
                    genre:    parsed.genre     || 'Afrobeat',
                    region:   parsed.region    || 'Niger',
                    emoji:    parsed.emoji     || '🎵',
                    duration: parsed.duration_sec || 210,
                    rating:   parsed.avg_rating   || 4.5,
                    lyrics:   [],
                    info:     { year: new Date().getFullYear(), label:'TMN Records', producer:'TMN', bpm: 95 },
                });
                currentIdx = 0;
            }
        } catch(e) {}
    }

    // 2. URL param ?id=
    const params = new URLSearchParams(location.search);
    const idParam = params.get('id');
    if (idParam && !stored) {
        try {
            const song = await TMNAPI.songs.get(idParam);
            SONGS.unshift({
                id: song.id, title: song.title, artist: song.artist_name || 'Artiste',
                genre: song.genre, region: song.region, emoji: song.emoji || '🎵',
                duration: song.duration_sec || 210, rating: song.avg_rating || 4.5,
                lyrics: [], info: { year: new Date().getFullYear(), label:'TMN Records', producer:'TMN', bpm: 95 },
            });
            currentIdx = 0;
        } catch(e) {}
    }

    // 3. Charge la liste Top depuis l'API pour la file de lecture
    if (SONGS.length <= 6) {
        try {
            const top = await TMNAPI.top.weekly();
            (top.data || []).forEach(s => {
                const alreadyHere = SONGS.some(existing => String(existing.id) === String(s.id) || existing.title === s.title);
                if (!alreadyHere) SONGS.push({
                    id: s.id, title: s.title, artist: s.artist_name || 'Artiste',
                    genre: s.genre, region: s.region, emoji: s.emoji || '🎵',
                    duration: s.duration_sec || 210, rating: s.avg_rating || 4.5,
                    lyrics: [], info: { year: new Date().getFullYear(), label:'TMN Records', producer:'TMN', bpm: 95 },
                });
            });
        } catch(e) {}
    }

    loadSong(currentIdx, false);
    initSwipe();

    // 4. Enregistre l'écoute après 10s
    setTimeout(async () => {
        if (SONGS[currentIdx]?.id) {
            await TMNAPI.songs.play(SONGS[currentIdx].id, SONGS[currentIdx].duration);
        }
    }, 10000);

    // 5. Volume initial
    AudioEngine.setVol(volume);

    // 6. Raccourcis clavier
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'Space')       { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight')  { e.preventDefault(); nextSong(); }
        if (e.code === 'ArrowLeft')   { e.preventDefault(); prevSong(); }
        if (e.code === 'ArrowUp')     { e.preventDefault(); AudioEngine.setVol(Math.min(1, volume + 0.1)); volume = Math.min(1, volume + 0.1); }
        if (e.code === 'ArrowDown')   { e.preventDefault(); AudioEngine.setVol(Math.max(0, volume - 0.1)); volume = Math.max(0, volume - 0.1); }
        if (e.code === 'KeyM')        { toggleMute(); }
        if (e.code === 'KeyS')        { toggleShuffle(); }
        if (e.code === 'KeyR')        { toggleRepeat(); }
    });

    // 7. Glisser-déposer un fichier MP3 sur le lecteur
    const dropZone = document.querySelector('.player-wrap');
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.style.outline='2px dashed rgba(201,168,76,.5)'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.outline='');
    dropZone.addEventListener('drop', e => {
        e.preventDefault(); dropZone.style.outline='';
        const file = e.dataTransfer.files[0];
        if (file) AudioEngine.importFile(file);
    });

    // 8. Media Session API (contrôles OS / écouteurs)
    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play',          () => { if(!isPlaying) togglePlay(); });
        navigator.mediaSession.setActionHandler('pause',         () => { if(isPlaying) togglePlay(); });
        navigator.mediaSession.setActionHandler('previoustrack', prevSong);
        navigator.mediaSession.setActionHandler('nexttrack',     nextSong);
        navigator.mediaSession.setActionHandler('seekto',        d => AudioEngine.seek(d.seekTime / (SONGS[currentIdx]?.duration || 210)));
    }

    // 9. Mise à jour des métadonnées Media Session à chaque changement de morceau
    function updateMediaSession() {
        if (!('mediaSession' in navigator)) return;
        const s = SONGS[currentIdx];
        navigator.mediaSession.metadata = new MediaMetadata({
            title:  s.title,
            artist: s.artist || s.artist_name || 'TOP Musique Niger',
            album:  s.genre  + ' · ' + (s.region || 'Niger'),
        });
        navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
    }
    // Exposer pour loadSong
    window._updateMediaSession = updateMediaSession;
    updateMediaSession();
});

/* ══════════════════════════════
   DYNAMIC BG
══════════════════════════════ */
function setColors(idx) {
    const [c1, c2] = SONG_COLORS[idx % SONG_COLORS.length];
    document.documentElement.style.setProperty('--c1', c1);
    document.documentElement.style.setProperty('--c2', c2);
    $('dynBg').style.background =
        `radial-gradient(ellipse at 25% 25%,${c1}55 0%,transparent 55%),` +
        `radial-gradient(ellipse at 75% 75%,${c2}33 0%,transparent 55%),` +
        `#080809`;
}

/* ══════════════════════════════
   LOAD SONG
══════════════════════════════ */
function loadSong(idx, autoPlay = true) {
    const s = SONGS[idx];
    currentIdx = idx;
    isLiked = TMNAPI ? TMNAPI.songs.isFavorited(String(s.id)) : false;
    userRating = 0;

    // UI updates
    $('tiTitle').textContent  = s.title;
    $('tiArtist').textContent = `${s.artist} · ${s.genre}`;
    $('discBg').textContent   = s.emoji;
    $('discEm').textContent   = s.emoji;
    $('tbSource').textContent = s.genre + ' · ' + s.region;

    $('tiLike').classList.remove('liked');
    setColors(idx);

    // Disc bounce anim
    $('coverDisc').classList.add('bounce');
    setTimeout(() => $('coverDisc').classList.remove('bounce'), 350);

    // Progress reset
    progress = 0;
    updateProgress();
    $('progTotal').textContent = fmtTime(s.duration);

    // Rating display
    renderRatingStars(s.rating, false);

    // Panels
    renderQueuePanel();
    renderLyricsPanel(s);
    renderInfoPanel(s);

    // Media Session
    if (window._updateMediaSession) window._updateMediaSession();

    if (autoPlay) {
        isPlaying = true;
        AudioEngine.load(s).then(() => {
            AudioEngine.play();
        });
        $('coverDisc').classList.add('spinning');
        $('coverDisc').classList.remove('paused');
        $('tonearm').classList.add('on-disc');
        $('tonearm').classList.remove('off-disc');
        $('playBtn').classList.add('playing');
        $('playIcon').className = 'fas fa-pause';
    } else {
        AudioEngine.load(s);
    }
}

/* ══════════════════════════════
   PLAY / PAUSE
══════════════════════════════ */
async function togglePlay() {
    isPlaying = !isPlaying;
    if (isPlaying) {
        await AudioEngine.play();
        $('coverDisc').classList.remove('paused');
        $('tonearm').classList.add('on-disc');
        $('tonearm').classList.remove('off-disc');
        $('playBtn').classList.add('playing');
        $('playIcon').className = 'fas fa-pause';
    } else {
        AudioEngine.pause();
        $('coverDisc').classList.add('paused');
        $('tonearm').classList.remove('on-disc');
        $('tonearm').classList.add('off-disc');
        $('playBtn').classList.remove('playing');
        $('playIcon').className = 'fas fa-play';
    }
}

/* ══════════════════════════════
   PROGRESS (délégué à AudioEngine)
══════════════════════════════ */
function startProgress() { /* géré par AudioEngine */ }
function stopViz()       { /* géré par AudioEngine */ }
function startViz()      { /* géré par AudioEngine */ }

function updateProgress() {
    const s = SONGS[currentIdx];
    if (!s) return;
    const dur = s.duration || 210;
    const pct = Math.min((progress / dur) * 100, 100);
    $('progFill').style.width = pct + '%';
    $('progCurrent').textContent = fmtTime(progress);
}

function seekProg(e) {
    const rect = $('progTrack').getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    AudioEngine.seek(pct);
    progress = Math.floor(pct * (SONGS[currentIdx]?.duration || 210));
    updateProgress();
    updateLyricsHighlight();
}

function fmtTime(s) {
    s = Math.max(0, Math.floor(s));
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

/* ══════════════════════════════
   NAV
══════════════════════════════ */
function prevSong() {
    let idx = currentIdx - 1;
    if (isShuffle) idx = Math.floor(Math.random() * SONGS.length);
    if (idx < 0) idx = SONGS.length - 1;
    loadSong(idx, isPlaying);
}
function nextSong() {
    let idx = currentIdx + 1;
    if (isShuffle) idx = Math.floor(Math.random() * SONGS.length);
    if (idx >= SONGS.length) {
        if (repeatMode === 1) idx = 0;
        else { isPlaying = false; idx = 0; loadSong(0, false); return; }
    }
    loadSong(idx, isPlaying);
}

function toggleShuffle() {
    isShuffle = !isShuffle;
    $('shuffleBtn').classList.toggle('active', isShuffle);
    showToast(isShuffle ? 'Lecture aléatoire activée' : 'Lecture aléatoire désactivée', 'info');
}
function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    const btn = $('repeatBtn');
    const icons = ['fa-repeat','fa-repeat','fa-1'];
    btn.innerHTML = `<i class="fas ${icons[repeatMode]}"></i>`;
    btn.classList.toggle('active', repeatMode > 0);
    const msgs = ['Répétition désactivée','Répéter tout','Répéter ce morceau'];
    showToast(msgs[repeatMode], 'info');
}

/* ══════════════════════════════
   VOLUME
══════════════════════════════ */
function setVolume(e) {
    const rect = $('volTrack').getBoundingClientRect();
    const v    = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    volume = v;
    AudioEngine.setVol(v);
}

function toggleMute() {
    volume = volume > 0 ? 0 : 0.75;
    AudioEngine.setVol(volume);
}

/* ══════════════════════════════
   IMPORT FICHIER LOCAL
══════════════════════════════ */
function onFileImport(input) {
    const file = input.files?.[0];
    if (!file) return;
    input.value = '';  // reset pour re-import du même fichier
    AudioEngine.importFile(file);

    // Affiche la barre d'info
    const bar = document.getElementById('audioInfoBar');
    const txt = document.getElementById('audioInfoTxt');
    if (bar && txt) {
        bar.style.display = 'flex';
        bar.style.alignItems = 'center';
        txt.textContent   = file.name.replace(/\.[^.]+$/, '');
        document.getElementById('audioBitrate').textContent = (file.size / 1048576).toFixed(1) + ' Mo';
        // Durée réelle après chargement
        const tempAu = new Audio(URL.createObjectURL(file));
        tempAu.addEventListener('loadedmetadata', () => {
            const dur = Math.round(tempAu.duration);
            if (dur && SONGS[currentIdx]) {
                SONGS[currentIdx].duration = dur;
                $('progTotal').textContent = fmtTime(dur);
                document.getElementById('audioBitrate').textContent =
                    `${(file.size / 1048576).toFixed(1)} Mo · ${fmtTime(dur)}`;
                tempAu.src = '';
            }
        });
    }

    // Lance la lecture si pas encore en cours
    if (!isPlaying) {
        isPlaying = true;
        AudioEngine.play();
        $('coverDisc').classList.remove('paused');
        $('tonearm').classList.add('on-disc');
        $('playBtn').classList.add('playing');
        $('playIcon').className = 'fas fa-pause';
    }
}


async function toggleLike() {
    const s = SONGS[currentIdx];
    if (s?.id && typeof TMNAPI !== 'undefined') {
        const data = await TMNAPI.songs.toggleFavorite(String(s.id));
        isLiked = data.favorited;
    } else {
        isLiked = !isLiked;
    }
    $('tiLike').classList.toggle('liked', isLiked);
    showToast(isLiked ? 'Ajouté aux favoris ❤️' : 'Retiré des favoris', isLiked ? 'success' : 'info');
}

function renderRatingStars(val, userMode=false) {
    const container = $('tiRating');
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
        const star = document.createElement('i');
        star.className = `fas fa-star${i <= Math.floor(val) ? '' : ' e'}`;
        if (userMode) star.onclick = () => setUserRating(i);
        container.appendChild(star);
    }
}

async function setUserRating(n) {
    userRating = n;
    renderRatingStars(n, true);
    const starsEl = $('infoRatingStars');
    if (starsEl) {
        starsEl.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const s = document.createElement('i');
            s.className = `fas fa-star${i <= n ? '' : ' e'}`;
            s.onclick = () => setUserRating(i);
            starsEl.appendChild(s);
        }
        const rv = $('infoRatingVal');
        if (rv) rv.textContent = n + '.0';
    }
    // Enregistre la note via API
    const song = SONGS[currentIdx];
    if (song?.id && typeof TMNAPI !== 'undefined') {
        const result = await TMNAPI.songs.rate(String(song.id), n);
        if (result.avg_rating) {
            song.rating = result.avg_rating;
            const rv = $('infoRatingVal');
            if (rv) rv.textContent = result.avg_rating.toFixed(1);
        }
    }
    showToast(`Note : ${n} ★ enregistrée`, 'success');
}

   TABS
══════════════════════════════ */
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));

/* ══ QUEUE PANEL ══ */
function renderQueuePanel() {
    const panel = $('panel-queue'); panel.innerHTML = '';
    SONGS.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = `queue-item${i === currentIdx ? ' current' : ''}`;
        el.innerHTML = `
            <div class="qi-playing-bars"><div class="qpb qpb1"></div><div class="qpb qpb2"></div><div class="qpb qpb3"></div></div>
            <span class="qi-num">${i+1}</span>
            <div class="qi-cover"><div class="qi-cb">${s.emoji}</div><div class="qi-ce">${s.emoji}</div></div>
            <div class="qi-info"><div class="qi-title">${s.title}</div><div class="qi-sub">${s.artist} · ${s.genre}</div></div>
            <span class="qi-dur">${fmtTime(s.duration)}</span>`;
        el.addEventListener('click', () => { loadSong(i, true); switchTab('queue'); });
        panel.appendChild(el);
    });
}

/* ══ LYRICS PANEL ══ */
const LYRIC_TIMINGS = [0, 18, 36, 54, 72, 90, 108, 126, 144, 162, 180, 200];
function renderLyricsPanel(song) {
    const panel = $('panel-lyrics'); panel.innerHTML = '';
    const hasLyrics = song.lyrics && song.lyrics.some(l => l.trim());
    if (!hasLyrics) {
        panel.innerHTML = `<div class="lyric-empty">🎵<br><br>Les paroles de<br><strong>${song.title}</strong><br>ne sont pas encore disponibles.</div>`;
        return;
    }
    song.lyrics.forEach((line, i) => {
        if (!line) return;
        const el = document.createElement('div');
        el.className = 'lyric-line'; el.dataset.time = LYRIC_TIMINGS[i] || i * 18;
        el.textContent = line;
        el.addEventListener('click', () => {
            progress = LYRIC_TIMINGS[i] || i * 18;
            updateProgress(); updateLyricsHighlight();
            if (!isPlaying) togglePlay();
        });
        panel.appendChild(el);
    });
    updateLyricsHighlight();
}

function updateLyricsHighlight() {
    const lines = document.querySelectorAll('.lyric-line');
    let activeEl = null;
    lines.forEach(el => {
        const t = +el.dataset.time;
        el.classList.remove('active', 'past');
        if (t <= progress) { el.classList.add('past'); activeEl = el; }
    });
    if (activeEl) {
        activeEl.classList.remove('past'); activeEl.classList.add('active');
        // Smooth scroll into view
        activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

/* ══════════════════════════════
   SWIPE
══════════════════════════════ */
function initSwipe() {
    /* ── Swipe gauche/droite sur la pochette → chanson précédente/suivante ── */
    const area = $('coverArea');
    area.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
    area.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 50) {
            if (dx < 0) nextSong();
            else prevSong();
        }
    }, {passive:true});

    /* ── Touch-drag sur la barre de progression ── */
    const track = $('progTrack');
    if (!track) return;
    let dragging = false;
    const applySeek = (clientX) => {
        const rect = track.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        AudioEngine.seek(pct);
        progress = Math.floor(pct * (SONGS[currentIdx]?.duration || 210));
        updateProgress();
        updateLyricsHighlight();
    };
    track.addEventListener('touchstart', e => { dragging = true; applySeek(e.touches[0].clientX); }, {passive:true});
    track.addEventListener('touchmove',  e => { if (dragging) applySeek(e.touches[0].clientX); },    {passive:true});
    track.addEventListener('touchend',   () => dragging = false, {passive:true});
}

function shareSong() {
    const s = SONGS[currentIdx];
    const artist = s.artist || s.artist_name || 'Artiste';
    const txt = `🎵 J'écoute "${s.title}" par ${artist} sur TOP Musique Niger !`;
    if (navigator.share) navigator.share({ title:'TOP Musique Niger', text:txt, url: location.href });
    else { navigator.clipboard?.writeText(txt); showToast('Lien copié !', 'success'); }
}

function addToPlaylist() {
    showToast('Sélectionne une playlist dans l\'app', 'info');
    setTimeout(() => { window.location.href = 'playlist.html'; }, 1200);
}

function setSleepTimer() {
    if (sleepTimer) {
        clearInterval(sleepTimer); sleepTimer = null; sleepMins = 0;
        $('sleepBadge')?.classList.remove('show');
        showToast('Minuterie annulée', 'info'); return;
    }
    // Affiche un mini menu flottant
    const existPicker = document.getElementById('sleepPicker');
    if (existPicker) { existPicker.remove(); return; }

    const picker = document.createElement('div');
    picker.id = 'sleepPicker';
    picker.style.cssText = [
        'position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+130px);left:50%;transform:translateX(-50%)',
        'background:#1e1e26;border:1px solid rgba(201,168,76,.35);border-radius:18px;padding:.7rem;',
        'display:flex;gap:.4rem;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.6);animation:slideUp .25s ease',
    ].join(';');
    [10,15,30,45,60,90].forEach(mins => {
        const btn = document.createElement('div');
        btn.style.cssText = 'padding:.45rem .7rem;border-radius:10px;background:rgba(255,255,255,.06);cursor:pointer;font-size:.78rem;font-weight:700;color:#c9a84c;border:1px solid rgba(201,168,76,.2);transition:all .18s;';
        btn.textContent = mins < 60 ? mins + 'min' : (mins/60) + 'h';
        btn.onmouseenter = () => btn.style.background = 'rgba(201,168,76,.15)';
        btn.onmouseleave = () => btn.style.background = 'rgba(255,255,255,.06)';
        btn.onclick = () => {
            picker.remove();
            sleepMins = mins;
            $('sleepLabel') && ($('sleepLabel').textContent = fmtTime(sleepMins * 60));
            $('sleepBadge')?.classList.add('show');
            sleepTimer = setInterval(() => {
                sleepMins -= 1/60;
                if ($('sleepLabel')) $('sleepLabel').textContent = fmtTime(Math.ceil(sleepMins * 60));
                if (sleepMins <= 0) {
                    clearInterval(sleepTimer); sleepTimer = null; sleepMins = 0;
                    $('sleepBadge')?.classList.remove('show');
                    if (isPlaying) {
                        isPlaying = false; AudioEngine.pause();
                        $('playIcon').className = 'fas fa-play';
                        $('playBtn').classList.remove('playing');
                    }
                    showToast('Minuterie terminée — bonne nuit 🌙', 'info');
                }
            }, 1000);
            showToast(`⏱ Minuterie : ${mins < 60 ? mins+'min' : (mins/60)+'h'}`, 'success');
        };
        picker.appendChild(btn);
    });
    document.body.appendChild(picker);
    setTimeout(() => document.addEventListener('click', function rmPicker(e) {
        if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', rmPicker); }
    }, { once: false }), 100);
}

/* ══════════════════════════════════════════════════════
   ÉGALISEUR GRAPHIQUE 5 BANDES
══════════════════════════════════════════════════════ */
const EQ = (() => {
    /* ── Presets (gains en dB pour chaque bande) ── */
    const PRESETS = [
        { name:'Flat',        gains:[  0,  0,  0,  0,  0], icon:'⚊' },
        { name:'Afrobeat',    gains:[+5, +3,  0, +2, +3], icon:'🥁' },
        { name:'Rap/Hip-Hop', gains:[+7, +4, -1, +2, +1], icon:'🎤' },
        { name:'Gospel',      gains:[+2,  0, +4, +5, +4], icon:'🙏' },
        { name:'R&B',         gains:[+4, +2, +1, +3, +2], icon:'🎶' },
        { name:'Jazz',        gains:[+3, +1, +2, +1, +3], icon:'🎷' },
        { name:'Rock',        gains:[+5, +3, -1, +3, +4], icon:'🎸' },
        { name:'Classique',   gains:[+2, +1, +1, +2, +4], icon:'🎻' },
        { name:'Bass Boost',  gains:[+9, +6,  0, -1, -1], icon:'🔊' },
        { name:'Treble Boost',gains:[-1,  0, +1, +5, +8], icon:'✨' },
        { name:'Vocal',       gains:[-2, -1, +5, +6, +3], icon:'🎙' },
        { name:'Nuit',        gains:[-3, -1, +1, +2, -2], icon:'🌙' },
    ];

    const BANDS     = AudioEngine.getBands();
    const RANGE     = 12;      // ±12 dB
    const TRACK_H   = 146;     // hauteur utile de la piste (px)
    let   eqGains   = [0, 0, 0, 0, 0];
    let   activePreset = 'Flat';
    let   specRaf   = null;
    let   specBars  = [];

    /* ── Construction du panneau ── */
    function build() {
        _buildGrid();
        _buildPresets();
        _buildSliders();
        _buildSpectrum();
    }

    /* Grille dB -12 … +12 */
    function _buildGrid() {
        const grid = document.getElementById('eqGrid'); grid.innerHTML = '';
        [+12, +6, 0, -6, -12].forEach(db => {
            const line = document.createElement('div'); line.className = 'eq-grid-line';
            line.innerHTML = `<span class="eq-grid-label">${db > 0 ? '+' : ''}${db}dB</span>`;
            grid.appendChild(line);
        });
    }

    /* Presets scrollables */
    function _buildPresets() {
        const wrap = document.getElementById('eqPresets'); wrap.innerHTML = '';
        PRESETS.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'eq-preset' + (p.name === activePreset ? ' active' : '');
            btn.dataset.name = p.name;
            btn.innerHTML = `${p.icon} ${p.name}`;
            btn.onclick = () => applyPreset(p.name);
            wrap.appendChild(btn);
        });
    }

    /* 5 sliders verticaux */
    function _buildSliders() {
        const wrap = document.getElementById('eqSliders');
        // Supprimer les bandes existantes (garder la grille)
        wrap.querySelectorAll('.eq-band').forEach(b => b.remove());

        BANDS.forEach((band, i) => {
            const clr = band.color;
            const band_div = document.createElement('div');
            band_div.className = 'eq-band';
            band_div.style.setProperty('--band-clr', clr);

            const freqLbl = document.createElement('div');
            freqLbl.className = 'eq-band-freq';
            freqLbl.textContent = band.freq >= 1000 ? (band.freq/1000)+'k' : band.freq+'Hz';

            const track = document.createElement('div');
            track.className = 'eq-band-track';

            const rail = document.createElement('div');
            rail.className = 'eq-band-rail';

            const fill = document.createElement('div');
            fill.className = 'eq-band-fill';
            fill.id = `eqFill${i}`;

            const thumb = document.createElement('div');
            thumb.className = 'eq-band-thumb';
            thumb.id = `eqThumb${i}`;
            thumb.style.borderColor = clr;
            thumb.style.boxShadow   = `0 0 0 3px ${clr}30`;

            rail.appendChild(fill);
            rail.appendChild(thumb);
            track.appendChild(rail);

            const val = document.createElement('div');
            val.className = 'eq-band-val';
            val.id = `eqVal${i}`;
            val.style.color = clr;
            val.textContent = '0dB';

            const name = document.createElement('div');
            name.className = 'eq-band-name';
            name.textContent = band.label;

            band_div.appendChild(freqLbl);
            band_div.appendChild(track);
            band_div.appendChild(val);
            band_div.appendChild(name);
            wrap.appendChild(band_div);

            // Positionner le thumb à la position courante
            _updateThumb(i, eqGains[i]);

            // ── Drag interactions ──
            _bindDrag(track, rail, i, clr);
        });
    }

    /* Mini spectre animé */
    function _buildSpectrum() {
        const wrap = document.getElementById('eqSpectrum'); wrap.innerHTML = '';
        specBars = [];
        for (let i = 0; i < 28; i++) {
            const b = document.createElement('div');
            b.className = 'eq-spec-bar';
            wrap.appendChild(b);
            specBars.push(b);
        }
    }

    /* Met à jour l'affichage d'une bande */
    function _updateThumb(i, db) {
        const thumb = document.getElementById(`eqThumb${i}`);
        const fill  = document.getElementById(`eqFill${i}`);
        const val   = document.getElementById(`eqVal${i}`);
        if (!thumb || !fill || !val) return;

        // Centre de la piste = 0 dB
        // top du thumb en % : 0dB → 50%, +12dB → 0%, -12dB → 100%
        const pct    = 50 - (db / RANGE) * 50;    // 0..100
        const pxTop  = (pct / 100) * TRACK_H;
        const center = TRACK_H / 2;

        thumb.style.top = (pxTop - 9) + 'px';     // centré sur le thumb (18px/2)

        // Fill : du centre vers le thumb
        if (db >= 0) {
            fill.style.top    = pxTop + 'px';
            fill.style.height = (center - pxTop) + 'px';
            fill.style.background = BANDS[i].color;
        } else {
            fill.style.top    = center + 'px';
            fill.style.height = (pxTop - center) + 'px';
            fill.style.background = `${BANDS[i].color}88`;
        }

        val.textContent = (db > 0 ? '+' : '') + db.toFixed(1) + 'dB';
        val.style.opacity = Math.abs(db) < 0.3 ? '0.35' : '1';
    }

    /* Bind drag sur une piste (souris + touch) */
    function _bindDrag(track, rail, i, clr) {
        let dragging = false;

        const getDb = (clientY) => {
            const rect = rail.getBoundingClientRect();
            const pct  = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
            return Math.round((0.5 - pct) * 2 * RANGE * 10) / 10;   // arrondi .1 dB
        };

        const move = (clientY) => {
            const db = getDb(clientY);
            eqGains[i] = db;
            _updateThumb(i, db);
            AudioEngine.setEQ(i, db);
            _clearPresetActive();
        };

        // Souris
        track.addEventListener('mousedown', e => {
            dragging = true;
            document.getElementById(`eqThumb${i}`).classList.add('dragging');
            move(e.clientY);
            const up   = () => { dragging = false; document.getElementById(`eqThumb${i}`)?.classList.remove('dragging'); document.removeEventListener('mouseup', up); document.removeEventListener('mousemove', mv); };
            const mv   = e2 => { if (dragging) move(e2.clientY); };
            document.addEventListener('mousemove', mv);
            document.addEventListener('mouseup', up);
        });

        // Touch
        track.addEventListener('touchstart', e => {
            e.stopPropagation();
            document.getElementById(`eqThumb${i}`).classList.add('dragging');
        }, {passive:true});
        track.addEventListener('touchmove', e => {
            e.stopPropagation();
            move(e.touches[0].clientY);
        }, {passive:true});
        track.addEventListener('touchend', e => {
            e.stopPropagation();
            document.getElementById(`eqThumb${i}`)?.classList.remove('dragging');
        }, {passive:true});

        // Clic simple sur la piste
        track.addEventListener('click', e => move(e.clientY));
    }

    /* ── Spectrogramme temps-réel ── */
    function _startSpectrum() {
        _stopSpectrum();
        const bands = AudioEngine.getBands();
        function frame() {
            specRaf = requestAnimationFrame(frame);
            // Utilise l'analyser via la méthode publique de AudioEngine
            const ctx = AudioEngine.getCtx();
            if (!ctx) return;
            // On récupère un snapshot pseudo-spectral basé sur les bandes EQ
            const bLen = specBars.length;
            specBars.forEach((bar, idx) => {
                // Simulation fréquentielle selon position + gain EQ
                const bandProg = idx / bLen;  // 0..1
                // Trouver la bande la plus proche
                const nearest = Math.min(Math.floor(bandProg * 5), 4);
                const gain    = (eqGains[nearest] + 12) / 24;  // 0..1
                const baseH   = isPlaying
                    ? (0.15 + gain * 0.25 + Math.abs(Math.sin(Date.now() * 0.002 + idx * 0.4)) * 0.3
                       + Math.random() * 0.12) * 40
                    : 2;
                bar.style.height = Math.max(2, baseH) + 'px';
                bar.style.opacity = isPlaying ? (0.3 + gain * 0.7) : '0.12';
            });
        }
        frame();
    }
    function _stopSpectrum() {
        if (specRaf) { cancelAnimationFrame(specRaf); specRaf = null; }
        specBars.forEach(b => { b.style.height = '2px'; b.style.opacity = '0.12'; });
    }

    /* ── Preset actif ── */
    function _setPresetActive(name) {
        activePreset = name;
        document.getElementById('eqPresetLabel').textContent = name;
        document.querySelectorAll('.eq-preset').forEach(b => {
            b.classList.toggle('active', b.dataset.name === name);
        });
    }
    function _clearPresetActive() {
        activePreset = '—';
        document.getElementById('eqPresetLabel').textContent = '—';
        document.querySelectorAll('.eq-preset').forEach(b => b.classList.remove('active'));
    }

    /* ── API publique ── */
    function applyPreset(name) {
        const p = PRESETS.find(x => x.name === name);
        if (!p) return;
        p.gains.forEach((g, i) => {
            eqGains[i] = g;
            _updateThumb(i, g);
            AudioEngine.setEQ(i, g);
        });
        _setPresetActive(name);
        showToast(`🎛 Preset : ${p.icon} ${name}`, 'success');
    }

    function reset() {
        eqGains = [0, 0, 0, 0, 0];
        BANDS.forEach((_, i) => { _updateThumb(i, 0); AudioEngine.setEQ(i, 0); });
        _setPresetActive('Flat');
        showToast('🎛 Égaliseur remis à plat', 'info');
    }

    function open() {
        build();
        document.getElementById('eqOverlay').classList.add('open');
        _startSpectrum();
    }

    function close() {
        document.getElementById('eqOverlay').classList.remove('open');
        _stopSpectrum();
    }

    return { open, close, applyPreset, reset, build };
})();

/* ── Glue fonctions (appelées depuis HTML) ── */
function openEQ()                   { EQ.open(); }
function closeEQ()                  { EQ.close(); }
function resetEQUI()                { EQ.reset(); }
function closeEQOnBg(e)             { if (e.target === document.getElementById('eqOverlay')) EQ.close(); }

function showToast(msg, type='info') {
    const t = $('toast'); $('toastMsg').textContent = msg;
    t.querySelector('i').className = type==='success' ? 'fas fa-circle-check' : type==='error' ? 'fas fa-circle-xmark' : 'fas fa-circle-info';
    t.className = `show ${type}`;
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = '', 3200);
}
TMN.init({ requireAuth: true, activeNav: 'profile' });
