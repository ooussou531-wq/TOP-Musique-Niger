<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e0530c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Top Niger – TOP Musique Niger</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#09090b;--card:#16161c;--card-h:#1e1e26;
  --border:rgba(255,255,255,.07);--border-md:rgba(255,255,255,.13);
  --accent:#e0530c;--ag:rgba(224,83,12,.3);--ad:rgba(224,83,12,.12);
  --gold:#c9a84c;--gg:rgba(201,168,76,.3);--gd:rgba(201,168,76,.12);
  --green:#0c7e40;--blue:#5b8dee;--purple:#9c27b0;--red:#e05252;
  --text:#f0ece4;--t2:#8a8790;--t3:#4a4850;
  --nav:68px;--hdr:56px;--radius:12px;--rlg:18px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:var(--bg);font-family:'Instrument Sans',sans-serif;color:var(--text);
  padding-top:var(--hdr);padding-bottom:calc(var(--nav)+1rem);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% -10%,rgba(201,168,76,.07),transparent 55%);}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:200;
  background:rgba(9,9,11,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.2rem;gap:.8rem;}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
  background:linear-gradient(90deg,var(--accent) 33%,#f5f0e8 33%,#f5f0e8 66%,var(--green) 66%);}
.hdr-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;flex:1;}
.hdr-title span{color:var(--gold);}
.hdr-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:.82rem;cursor:pointer;transition:all .2s;}
.hdr-btn:hover{color:var(--text);}

/* TABS */
.tabs{display:flex;gap:.4rem;overflow-x:auto;scrollbar-width:none;padding:1rem 1.2rem .5rem;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:.38rem .9rem;border-radius:100px;font-size:.76rem;font-weight:600;
  cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--t2);transition:all .2s;}
.tab:hover{border-color:var(--border-md);color:var(--text);}
.tab.active{background:var(--gd);border-color:rgba(201,168,76,.4);color:var(--gold);}

/* WEEK SELECTOR */
.week-row{display:flex;align-items:center;gap:.6rem;padding:.3rem 1.2rem .7rem;}
.week-nav{width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--t2);cursor:pointer;transition:all .2s;}
.week-nav:hover{color:var(--text);}
.week-nav:disabled{opacity:.3;cursor:not-allowed;}
.week-label{font-family:'DM Mono',monospace;font-size:.74rem;color:var(--t2);flex:1;text-align:center;}
.week-badge{font-size:.62rem;font-weight:700;background:var(--gd);color:var(--gold);
  border:1px solid rgba(201,168,76,.3);padding:.15rem .5rem;border-radius:100px;}

/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:.6rem;padding:1rem 1.2rem 1.3rem;margin:0 auto;max-width:480px;}
.pod{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex:1;animation:podUp .5s cubic-bezier(.22,1,.36,1) both;}
.pod-2{animation-delay:.1s;}
.pod-1{animation-delay:0s;margin-top:0;}
.pod-3{animation-delay:.2s;}
@keyframes podUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.pod-cov{position:relative;}
.pod-cov-inner{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;
  background:var(--card);border:2px solid var(--border);}
.pod-1 .pod-cov-inner{width:72px;height:72px;border-color:var(--gold);box-shadow:0 6px 24px var(--gg);font-size:2rem;}
.pod-2 .pod-cov-inner{width:58px;height:58px;border-color:var(--t3);}
.pod-3 .pod-cov-inner{width:52px;height:52px;border-color:rgba(164,120,60,.5);}
.pod-crown{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:1rem;}
.pod-rank{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:800;padding:.12rem .5rem;
  border-radius:100px;background:var(--card);}
.pod-1 .pod-rank{color:var(--gold);background:var(--gd);}
.pod-2 .pod-rank{color:var(--t2);}
.pod-3 .pod-rank{color:#a4783c;}
.pod-title{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:800;text-align:center;
  max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pod-artist{font-size:.62rem;color:var(--t2);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pod-plays{font-size:.6rem;color:var(--t3);}

/* TRACK LIST */
.main{max-width:680px;margin:0 auto;padding:0 1.1rem;}
.tl{display:flex;flex-direction:column;gap:.38rem;}
.ti{display:flex;align-items:center;gap:.8rem;padding:.65rem .85rem;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .18s;animation:fadeUp .25s ease both;}
.ti:hover{background:var(--card-h);border-color:var(--border-md);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ti-rank{font-family:'DM Mono',monospace;font-size:.76rem;color:var(--t3);min-width:22px;text-align:center;flex-shrink:0;}
.ti-delta{font-size:.55rem;display:block;margin-top:.1rem;}
.ti-delta.up{color:var(--green);}
.ti-delta.down{color:var(--red);}
.ti-delta.same{color:var(--t3);}
.ti-cov{width:44px;height:44px;border-radius:10px;flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.ti-cov-bg{position:absolute;inset:0;filter:blur(8px);opacity:.35;transform:scale(1.4);display:flex;align-items:center;justify-content:center;font-size:2.8rem;}
.ti-cov-em{position:relative;z-index:1;font-size:1.15rem;}
.ti-info{flex:1;min-width:0;}
.ti-title{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ti-sub{font-size:.72rem;color:var(--t2);}
.ti-right{display:flex;flex-direction:column;align-items:flex-end;gap:.15rem;flex-shrink:0;}
.ti-plays{font-size:.68rem;color:var(--t3);}
.ti-star{font-size:.64rem;color:var(--gold);}
.ti-genre{font-size:.58rem;font-weight:700;padding:.1rem .42rem;border-radius:100px;}
.fav-btn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;cursor:pointer;transition:all .2s;flex-shrink:0;background:none;border:1.5px solid var(--border);}
.fav-btn:hover{border-color:rgba(224,82,82,.4);color:var(--red);}
.fav-btn.active{background:rgba(224,82,82,.12);border-color:rgba(224,82,82,.4);color:var(--red);}

/* GENRE / REGION SECTION */
.gr-tabs{display:flex;gap:.4rem;overflow-x:auto;scrollbar-width:none;margin-bottom:.8rem;}
.gr-tabs::-webkit-scrollbar{display:none;}
.gr-tab{flex-shrink:0;padding:.35rem .8rem;border-radius:100px;font-size:.74rem;font-weight:700;
  cursor:pointer;border:1.5px solid;transition:all .2s;}
.gr-tab:hover{transform:translateY(-1px);}

/* SKELETON */
.sk{background:linear-gradient(90deg,var(--card) 0%,var(--card-h) 50%,var(--card) 100%);
  background-size:200%;animation:shimmer 1.4s ease-in-out infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.sk-row{display:flex;align-items:center;gap:.8rem;padding:.65rem .85rem;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.38rem;}
.sk-cov{width:44px;height:44px;border-radius:10px;flex-shrink:0;}
.sk-lines{flex:1;display:flex;flex-direction:column;gap:.35rem;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);
  background:rgba(9,9,11,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;padding:0 .5rem;z-index:200;}
.bottom-nav::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--accent) 33%,rgba(245,240,232,.4) 33%,rgba(245,240,232,.4) 66%,var(--green) 66%);opacity:.6;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;flex:1;padding:.5rem;
  color:var(--t3);font-size:.6rem;font-weight:500;text-decoration:none;transition:all .2s;position:relative;}
.nav-item i{font-size:1.18rem;}
.nav-item.active{color:var(--gold);}
.nav-pub i,.nav-exp i{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#a83800);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.98rem;color:#fff;box-shadow:0 4px 16px var(--ag);margin-bottom:.1rem;}
.nav-pub,.nav-exp{color:var(--t2);margin-top:-10px;}

#toast{position:fixed;bottom:calc(var(--nav)+1rem);left:50%;transform:translateX(-50%) translateY(60px);
  opacity:0;background:var(--card);border:1px solid var(--border-md);padding:.6rem 1.2rem;
  border-radius:100px;font-size:.82rem;z-index:9999;display:flex;align-items:center;gap:.5rem;
  box-shadow:0 8px 28px rgba(0,0,0,.5);transition:all .32s cubic-bezier(.22,1,.36,1);white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.warn{border-color:rgba(201,168,76,.4);color:var(--gold);}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">🏆 <span>Top</span> Niger</div>
  <div class="hdr-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab-weekly" onclick="setTab('weekly')">🏆 Hebdo</div>
  <div class="tab" id="tab-genres"        onclick="setTab('genres')">🎵 Genres</div>
  <div class="tab" id="tab-regions"       onclick="setTab('regions')">📍 Régions</div>
</div>

<div id="weekRow" class="week-row">
  <button class="week-nav" id="prevWeek" onclick="changeWeek(-1)"><i class="fas fa-chevron-left"></i></button>
  <div class="week-label" id="weekLabel">Semaine actuelle</div>
  <span class="week-badge" id="weekBadge">LIVE</span>
  <button class="week-nav" id="nextWeek" onclick="changeWeek(1)" disabled><i class="fas fa-chevron-right"></i></button>
</div>

<div id="podiumWrap"></div>

<main class="main">
  <div id="tabContent"></div>
</main>

<nav class="bottom-nav" id="bottomNav"></nav>
<div id="toast"><i class="fas fa-circle-info"></i><span id="toastMsg"></span></div>

<script src="app.js"></script>
<script src="tmn-api.js"></script>
<script>
TMN.init({ requireAuth: false, activeNav: 'top' });

const GENRE_COLOR={Afrobeat:'#c9a84c',Rap:'#e0530c',Gospel:'#0c7e40','R&B':'#5b8dee',Zouk:'#9c27b0',Mandé:'#0c7e40',Haoussa:'#e05252'};
const GENRE_BG   ={Afrobeat:'rgba(201,168,76,.12)',Rap:'rgba(224,83,12,.12)',Gospel:'rgba(12,126,64,.12)','R&B':'rgba(91,141,238,.12)',Zouk:'rgba(156,39,176,.12)',Mandé:'rgba(12,126,64,.1)',Haoussa:'rgba(224,82,82,.12)'};

let activeTab='weekly';
let weekOffset=0;
const nowWeek=currentWeekStr();

function currentWeekStr(){
  const d=new Date(),jan1=new Date(d.getFullYear(),0,1);
  const w=Math.ceil((((d-jan1)/86400000)+jan1.getDay()+1)/7);
  return `${d.getFullYear()}-${String(w).padStart(2,'0')}`;
}
function offsetWeek(str,offset){
  if(!offset)return str;
  const [y,w]=str.split('-').map(Number);
  const totalW=y*52+w+offset;
  return `${Math.floor(totalW/52)}-${String(totalW%52||1).padStart(2,'0')}`;
}

// Build nav
const nav=document.getElementById('bottomNav');
const isA=TMN.isArtist();
const navItems=isA?[
  {icon:'fa-house',lbl:'Accueil',url:'home.html'},{icon:'fa-trophy',lbl:'Top',url:'top.html',active:true},
  {icon:'fa-plus',lbl:'Publier',url:'publish.html',center:true},{icon:'fa-chart-line',lbl:'Stats',url:'stats.html'},
  {icon:'fa-microphone',lbl:'Profil',url:'profil-artiste.html'},
]:[
  {icon:'fa-house',lbl:'Accueil',url:'home.html'},{icon:'fa-trophy',lbl:'Top',url:'top.html',active:true},
  {icon:'fa-compass',lbl:'Explorer',url:'explore.html',center:true},{icon:'fa-heart',lbl:'Favoris',url:'favorites.html'},
  {icon:'fa-user',lbl:'Profil',url:'profil-auditeur.html'},
];
navItems.forEach(item=>{
  const a=document.createElement('a');a.href=item.url;
  a.className='nav-item'+(item.active?' active':'')+(item.center?' nav-pub':'');
  a.innerHTML=`<i class="fas ${item.icon}"></i><span>${item.lbl}</span>`;
  nav.appendChild(a);
});

function setTab(tab){
  activeTab=tab;
  ['weekly','genres','regions'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  document.getElementById('weekRow').style.display  =tab==='weekly'?'flex':'none';
  document.getElementById('podiumWrap').style.display=tab==='weekly'?'block':'none';
  loadTab();
}

function changeWeek(dir){
  weekOffset+=dir;
  document.getElementById('nextWeek').disabled=weekOffset>=0;
  document.getElementById('weekBadge').textContent=weekOffset===0?'LIVE':`S-${Math.abs(weekOffset)}`;
  loadTab();
}

function showSkeleton(){
  const c=document.getElementById('tabContent');c.innerHTML='';
  for(let i=0;i<8;i++){
    const d=document.createElement('div');d.className='sk-row';
    d.innerHTML=`<div class="sk-cov sk"></div><div class="sk-lines">
      <div class="sk" style="height:11px;width:${40+Math.random()*30}%;border-radius:4px;"></div>
      <div class="sk" style="height:9px;width:${20+Math.random()*20}%;border-radius:4px;margin-top:.3rem;"></div>
    </div>`;
    c.appendChild(d);
  }
}

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n);}

function renderPodium(songs){
  const wrap=document.getElementById('podiumWrap');wrap.innerHTML='';
  if(!songs||songs.length<3)return;
  const order=[songs[1],songs[0],songs[2]];
  const ranks=[2,1,3];
  const pod=document.createElement('div');pod.className='podium';
  order.forEach((s,i)=>{
    if(!s)return;
    const r=ranks[i];
    const clr=GENRE_COLOR[s.genre]||'#c9a84c';
    const div=document.createElement('div');div.className=`pod pod-${r}`;div.style.cursor='pointer';
    div.innerHTML=`
      <div class="pod-cov">
        ${r===1?'<div class="pod-crown">👑</div>':''}
        <div class="pod-cov-inner" style="background:${clr}18;border-color:${clr}${r===1?';box-shadow:0 6px 24px '+clr+'55':''};">
          ${s.emoji||'🎵'}
        </div>
      </div>
      <div class="pod-rank">#${r}</div>
      <div class="pod-title">${s.title}</div>
      <div class="pod-artist">${s.artist_name||s.artist||'—'}</div>
      <div class="pod-plays">${fmt(s.play_count||0)} écoutes</div>`;
    div.onclick=()=>{sessionStorage.setItem('tmn_current_song',JSON.stringify(s));location.href='player.html';};
    pod.appendChild(div);
  });
  wrap.appendChild(pod);
}

function renderWeekly(songs){
  const c=document.getElementById('tabContent');c.innerHTML='';
  const tl=document.createElement('div');tl.className='tl';
  songs.slice(3).forEach((s,i)=>{
    const rank=i+4;
    const clr=GENRE_COLOR[s.genre]||'#c9a84c';
    const gbg=GENRE_BG[s.genre]||'rgba(201,168,76,.12)';
    const isFav=TMNAPI.songs.isFavorited(s.id||'');
    const delta=s.prev_pos?s.prev_pos-rank:0;
    const deltaHtml=delta>0?`<span class="ti-delta up">▲${delta}</span>`:delta<0?`<span class="ti-delta down">▼${Math.abs(delta)}</span>`:`<span class="ti-delta same">—</span>`;
    const d=document.createElement('div');d.className='ti';d.style.animationDelay=(i*.03)+'s';
    d.innerHTML=`
      <div class="ti-rank">${rank}${deltaHtml}</div>
      <div class="ti-cov" style="background:${clr}18;"><div class="ti-cov-bg">${s.emoji||'🎵'}</div><div class="ti-cov-em">${s.emoji||'🎵'}</div></div>
      <div class="ti-info"><div class="ti-title">${s.title}</div><div class="ti-sub">${s.artist_name||s.artist||'—'} · ${s.region||''}</div></div>
      <div class="ti-right">
        <div class="ti-plays">${fmt(s.play_count||0)}</div>
        <div class="ti-star">★ ${s.avg_rating||'—'}</div>
        <div class="ti-genre" style="background:${gbg};color:${clr};">${s.genre}</div>
      </div>
      <div class="fav-btn${isFav?' active':''}" onclick="toggleFav(this,'${s.id}',event)"><i class="fas fa-heart"></i></div>`;
    d.querySelector('.ti-cov,.ti-info,.ti-right').addEventListener?.('click',()=>{sessionStorage.setItem('tmn_current_song',JSON.stringify(s));location.href='player.html';});
    d.addEventListener('click',e=>{if(!e.target.closest('.fav-btn')){sessionStorage.setItem('tmn_current_song',JSON.stringify(s));location.href='player.html';}});
    tl.appendChild(d);
  });
  c.appendChild(tl);
}

function renderGenres(data){
  const c=document.getElementById('tabContent');c.innerHTML='';
  Object.entries(data).forEach(([genre,songs])=>{
    if(!songs.length)return;
    const clr=GENRE_COLOR[genre]||'#c9a84c';
    const gbg=GENRE_BG[genre]||'rgba(201,168,76,.1)';
    const sec=document.createElement('div');sec.style.marginBottom='1.3rem';
    const top3=songs.slice(0,3);
    sec.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;">
      <div style="font-family:Syne,sans-serif;font-size:.84rem;font-weight:800;display:flex;align-items:center;gap:.4rem;">
        <span style="font-size:.7rem;font-weight:700;padding:.12rem .45rem;border-radius:100px;background:${gbg};color:${clr};">${genre}</span>
      </div>
      <div style="font-size:.68rem;color:var(--t3);">${songs.length} morceaux</div>
    </div>`;
    const tl=document.createElement('div');tl.className='tl';
    top3.forEach((s,i)=>{
      const d=document.createElement('div');d.className='ti';d.style.animationDelay=(i*.04)+'s';
      d.innerHTML=`<div class="ti-rank" style="color:${clr};font-weight:800;">${i+1}</div>
        <div class="ti-cov" style="background:${clr}18;"><div class="ti-cov-bg">${s.emoji||'🎵'}</div><div class="ti-cov-em">${s.emoji||'🎵'}</div></div>
        <div class="ti-info"><div class="ti-title">${s.title}</div><div class="ti-sub">${s.artist_name||'—'} · ${s.region||''}</div></div>
        <div class="ti-right"><div class="ti-plays">${fmt(s.play_count||0)}</div><div class="ti-star">★ ${s.avg_rating||'—'}</div></div>`;
      d.onclick=()=>{sessionStorage.setItem('tmn_current_song',JSON.stringify(s));location.href='player.html';};
      tl.appendChild(d);
    });
    sec.appendChild(tl);
    c.appendChild(sec);
  });
}

function renderRegions(data){
  const c=document.getElementById('tabContent');c.innerHTML='';
  Object.entries(data).forEach(([region,songs])=>{
    if(!songs.length)return;
    const sec=document.createElement('div');sec.style.marginBottom='1.3rem';
    sec.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;">
      <div style="font-family:Syne,sans-serif;font-size:.84rem;font-weight:800;">📍 ${region}</div>
      <div style="font-size:.68rem;color:var(--t3);">${songs.length} morceaux</div>
    </div>`;
    const tl=document.createElement('div');tl.className='tl';
    songs.slice(0,3).forEach((s,i)=>{
      const clr=GENRE_COLOR[s.genre]||'#c9a84c';
      const d=document.createElement('div');d.className='ti';d.style.animationDelay=(i*.04)+'s';
      d.innerHTML=`<div class="ti-rank" style="font-weight:800;">${i+1}</div>
        <div class="ti-cov" style="background:${clr}18;"><div class="ti-cov-bg">${s.emoji||'🎵'}</div><div class="ti-cov-em">${s.emoji||'🎵'}</div></div>
        <div class="ti-info"><div class="ti-title">${s.title}</div><div class="ti-sub">${s.artist_name||'—'} · ${s.genre||''}</div></div>
        <div class="ti-right"><div class="ti-plays">${fmt(s.play_count||0)}</div><div class="ti-star">★ ${s.avg_rating||'—'}</div></div>`;
      d.onclick=()=>{sessionStorage.setItem('tmn_current_song',JSON.stringify(s));location.href='player.html';};
      tl.appendChild(d);
    });
    sec.appendChild(tl);
    c.appendChild(sec);
  });
}

async function loadTab(){
  showSkeleton();
  if(activeTab==='weekly'){
    const week=offsetWeek(nowWeek,weekOffset);
    document.getElementById('weekLabel').textContent=`Semaine ${week}`;
    const data=await TMNAPI.top.weekly(week);
    renderPodium(data.data||[]);
    renderWeekly(data.data||[]);
  } else if(activeTab==='genres'){
    document.getElementById('tabContent').innerHTML='';
    const data=await TMNAPI.top.byGenre();
    renderGenres(data.data||{});
  } else {
    document.getElementById('tabContent').innerHTML='';
    const data=await TMNAPI.top.byRegion();
    renderRegions(data.data||{});
  }
}

async function toggleFav(btn,id,e){
  e.stopPropagation();
  const data=await TMNAPI.songs.toggleFavorite(id);
  btn.classList.toggle('active',data.favorited);
  showToast(data.favorited?'❤️ Ajouté aux favoris':'💔 Retiré des favoris');
}

function showToast(msg){
  const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;
  t.className='show';clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2500);
}

loadTab();
</script>
</body>
</html>
