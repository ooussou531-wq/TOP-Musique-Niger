<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e0530c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Explorer – TOP Musique Niger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
    :root {
        --bg:#080809; --surface:#111113; --card:#18181c; --card-h:#202026;
        --border:rgba(255,255,255,.07); --border-md:rgba(255,255,255,.12);
        --accent:#e0530c; --accent-d:rgba(224,83,12,.12); --accent-glow:rgba(224,83,12,.32);
        --green:#0c7e40; --green-d:rgba(12,126,64,.12); --green-glow:rgba(12,126,64,.3);
        --gold:#c9a84c; --gold-d:rgba(201,168,76,.12); --gold-glow:rgba(201,168,76,.3);
        --blue:#5b8dee; --blue-d:rgba(91,141,238,.12);
        --text:#f0ece4; --text-2:#9a9698; --text-3:#55535a;
        --nav-h:68px; --hdr-h:60px; --radius:14px; --radius-lg:20px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);
        min-height:100vh;padding-top:var(--hdr-h);padding-bottom:calc(var(--nav-h)+3rem);overflow-x:hidden;}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
        background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        opacity:.45;}
    a{text-decoration:none;color:inherit;}
    button{border:none;background:none;cursor:pointer;font-family:inherit;color:inherit;}

    /* ── HEADER ── */
    .top-header{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);
        background:rgba(8,8,9,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
        z-index:200;display:flex;align-items:center;padding:0 1.2rem;gap:.9rem;}
    .top-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
        background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 33%,#f5f0e8 33%,#f5f0e8 66%,var(--green) 66%);}
    .hdr-logo{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;flex-shrink:0;}
    .hdr-logo span{color:var(--accent);}

    /* Search bar (always visible in header) */
    .search-wrap{flex:1;position:relative;}
    .search-inp{width:100%;height:38px;border-radius:100px;padding:0 1rem 0 2.5rem;
        background:var(--card);border:1.5px solid var(--border);color:var(--text);
        font-family:'Instrument Sans',sans-serif;font-size:.9rem;outline:none;transition:all .22s;}
    .search-inp:focus{border-color:var(--accent);background:var(--card-h);box-shadow:0 0 0 3px var(--accent-d);}
    .search-inp::placeholder{color:var(--text-3);}
    .s-ico{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:.8rem;pointer-events:none;transition:color .2s;}
    .search-wrap:focus-within .s-ico{color:var(--accent);}
    .s-clear{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:.75rem;cursor:pointer;display:none;padding:.25rem;}
    .s-clear.show{display:block;}

    /* ── MAIN ── */
    .main{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:1.2rem 1.2rem;}

    /* ── STATES ── */
    #stateDefault{} #stateResults{display:none;} #stateEmpty{display:none;}

    /* ── FILTERS BAR ── */
    .filters-bar{display:flex;gap:.4rem;overflow-x:auto;padding:.05rem 0 .5rem;scrollbar-width:none;margin-bottom:1.2rem;}
    .filters-bar::-webkit-scrollbar{display:none;}
    .filter-btn{flex-shrink:0;padding:.42rem .9rem;border-radius:100px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;background:var(--card);border:1.5px solid var(--border);color:var(--text-3);white-space:nowrap;}
    .filter-btn.active{background:var(--accent-d);color:var(--accent);border-color:rgba(224,83,12,.4);}
    .filter-btn:hover:not(.active){color:var(--text-2);border-color:var(--border-md);}

    /* Sort row */
    .sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
    .sort-count{font-size:.78rem;color:var(--text-3);}
    .sort-select{font-size:.75rem;color:var(--text-2);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.3rem .6rem;outline:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;}
    .sort-select option{background:#1c1c21;}

    /* ── RESULT ITEM ── */
    .result-list{display:flex;flex-direction:column;gap:.4rem;}
    .res-item{display:flex;align-items:center;gap:.85rem;padding:.7rem .9rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .18s;position:relative;overflow:hidden;animation:fadeUp .3s ease both;}
    .res-item:hover{background:var(--card-h);border-color:var(--border-md);}
    .res-item::after{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(224,83,12,.06),transparent);transition:width .3s;}
    .res-item:hover::after{width:100%;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .ri-type{width:44px;height:44px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .ri-type.song{background:linear-gradient(135deg,var(--accent),var(--gold));}
    .ri-type.artist{border-radius:50%;background:linear-gradient(135deg,#0c7e40,#065225);}
    .ri-type.genre{background:linear-gradient(135deg,#5b8dee,#3a6bc4);}
    .ri-type.region{background:linear-gradient(135deg,var(--gold),#8a6820);}
    .ri-bg{position:absolute;inset:0;font-size:2.5rem;display:flex;align-items:center;justify-content:center;filter:blur(8px);opacity:.35;transform:scale(1.4);}
    .ri-em{position:relative;z-index:1;font-size:1.15rem;}
    .ri-info{flex:1;min-width:0;}
    .ri-title{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ri-sub{font-size:.72rem;color:var(--text-2);margin-top:.1rem;display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;}
    .ri-tag{padding:.1rem .45rem;border-radius:100px;font-size:.64rem;font-weight:600;}
    .ri-tag.song{background:var(--accent-d);color:var(--accent);}
    .ri-tag.artist{background:var(--green-d);color:var(--green);}
    .ri-tag.genre{background:var(--blue-d);color:var(--blue);}
    .ri-tag.region{background:var(--gold-d);color:var(--gold);}
    .ri-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
    .ri-stars{display:flex;gap:1px;}
    .ri-stars i{font-size:.62rem;color:var(--gold);}
    .ri-stars i.e{color:var(--text-3);}
    .ri-plays{font-size:.7rem;color:var(--text-3);}
    .ri-play{width:32px;height:32px;border-radius:50%;background:var(--accent-d);color:var(--accent);border:1px solid rgba(224,83,12,.25);display:flex;align-items:center;justify-content:center;font-size:.76rem;transition:all .18s;flex-shrink:0;}
    .ri-play:hover{background:var(--accent);color:#fff;}
    /* Highlight matched text */
    mark{background:rgba(224,83,12,.2);color:var(--accent);border-radius:2px;padding:0 1px;}

    /* ── SECTION HEADER (default state) ── */
    .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;}
    .sec-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.45rem;}
    .sec-title i{color:var(--accent);font-size:.85rem;}
    .sec-link{font-size:.75rem;color:var(--text-2);cursor:pointer;transition:color .2s;display:flex;align-items:center;gap:.25rem;}
    .sec-link:hover{color:var(--text);}
    .section{margin-bottom:1.8rem;}

    /* ── EXPLORE CATEGORY GRID ── */
    .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;}
    .cat-card{border-radius:var(--radius-lg);padding:1.2rem 1rem;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;}
    .cat-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.5);}
    .cat-card::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.25);transition:opacity .2s;}
    .cat-card:hover::before{opacity:.1;}
    .cat-card-deco{position:absolute;top:-10px;right:-10px;font-size:3.5rem;opacity:.25;transform:rotate(15deg);transition:transform .3s;}
    .cat-card:hover .cat-card-deco{transform:rotate(20deg) scale(1.1);}
    .cat-card-label{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:#fff;position:relative;z-index:1;text-shadow:0 1px 6px rgba(0,0,0,.6);}
    .cat-card-sub{font-size:.68rem;color:rgba(255,255,255,.7);position:relative;z-index:1;margin-top:.1rem;}

    /* ── H-SCROLL ── */
    .h-scroll{display:flex;gap:.75rem;overflow-x:auto;padding:.05rem 0 .6rem;scrollbar-width:none;}
    .h-scroll::-webkit-scrollbar{display:none;}

    /* Region chip */
    .region-chip{flex-shrink:0;display:flex;align-items:center;gap:.5rem;padding:.55rem 1rem;border-radius:100px;background:var(--card);border:1.5px solid var(--border);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text-2);}
    .region-chip i{font-size:.75rem;}
    .region-chip:hover{border-color:var(--border-md);color:var(--text);}
    .region-chip.active{background:var(--gold-d);color:var(--gold);border-color:rgba(201,168,76,.4);}

    /* Popular search chips */
    .search-chips{display:flex;flex-wrap:wrap;gap:.4rem;}
    .sch{padding:.35rem .8rem;border-radius:100px;font-size:.78rem;font-weight:500;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--text-2);transition:all .2s;}
    .sch:hover{color:var(--text);border-color:var(--border-md);}
    .sch.trending{border-color:rgba(224,83,12,.25);color:var(--accent);background:var(--accent-d);}

    /* History list */
    .hist-list{display:flex;flex-direction:column;gap:.35rem;}
    .hist-item{display:flex;align-items:center;gap:.75rem;padding:.55rem .7rem;border-radius:var(--radius);cursor:pointer;transition:background .18s;}
    .hist-item:hover{background:var(--card);}
    .hist-icon{width:32px;height:32px;border-radius:8px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--text-3);flex-shrink:0;}
    .hist-text{flex:1;font-size:.84rem;color:var(--text-2);}
    .hist-del{color:var(--text-3);font-size:.72rem;padding:.25rem;transition:color .18s;}
    .hist-del:hover{color:var(--error,#e05252);}

    /* Empty state */
    .empty-state{text-align:center;padding:3rem 1rem;}
    .empty-icon{font-size:3.5rem;margin-bottom:1rem;opacity:.4;}
    .empty-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:.4rem;color:var(--text-2);}
    .empty-sub{font-size:.84rem;color:var(--text-3);line-height:1.6;}

    /* ── TRENDING MARQUEE STRIP ── */
    .marquee-wrap{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(224,83,12,.04);padding:.5rem 0;margin-bottom:1.5rem;}
    .marquee-inner{display:flex;gap:2rem;white-space:nowrap;animation:marquee 22s linear infinite;}
    .marquee-inner:hover{animation-play-state:paused;}
    @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .mq-item{display:inline-flex;align-items:center;gap:.4rem;font-size:.74rem;color:var(--text-2);cursor:pointer;transition:color .2s;flex-shrink:0;}
    .mq-item:hover{color:var(--text);}
    .mq-item i{color:var(--accent);font-size:.65rem;}

    /* ── MINI PLAYER ── */
    .mini-player{position:fixed;bottom:calc(var(--nav-h)+.5rem);left:1rem;right:1rem;background:rgba(15,15,17,.97);backdrop-filter:blur(24px);border:1px solid var(--border-md);border-radius:var(--radius-lg);z-index:150;padding:.8rem 1.1rem;transform:translateY(calc(100% + var(--nav-h) + 2rem));transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:0 -6px 32px rgba(0,0,0,.6);}
    .mini-player::before{content:'';position:absolute;top:0;left:1.5rem;right:1.5rem;height:2px;border-radius:1px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--green));}
    .mini-player.show{transform:translateY(0);}
    .mp-inner{display:flex;align-items:center;gap:.9rem;}
    .mp-cov{width:44px;height:44px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.1rem;position:relative;overflow:hidden;}
    .mp-cov-bg{position:absolute;inset:0;font-size:2.5rem;display:flex;align-items:center;justify-content:center;filter:blur(8px);opacity:.35;transform:scale(1.4);}
    .mp-cov-em{position:relative;z-index:1;}
    .mp-info{flex:1;min-width:0;}
    .mp-title{font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mp-artist{font-size:.72rem;color:var(--text-2);}
    .mp-ctrl{display:flex;align-items:center;gap:.4rem;}
    .mp-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);color:var(--text-2);display:flex;align-items:center;justify-content:center;font-size:.82rem;cursor:pointer;transition:all .18s;}
    .mp-btn:hover{color:var(--text);}
    .mp-play-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;font-size:.92rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s;box-shadow:0 3px 14px var(--accent-glow);}
    .mp-play-btn:hover{transform:scale(1.08);}
    .mp-prog{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:.75rem;cursor:pointer;}
    .mp-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width .5s linear;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(10,10,12,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:0 .5rem;z-index:200;}
    .bottom-nav::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 33%,rgba(245,240,232,.4) 33%,rgba(245,240,232,.4) 66%,var(--green) 66%);opacity:.6;}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;flex:1;padding:.5rem;color:var(--text-3);font-size:.6rem;font-weight:500;text-decoration:none;border-radius:10px;transition:all .2s;}
    .nav-item i{font-size:1.18rem;}
    .nav-item.active{color:var(--blue);}
    .nav-item.active i{filter:drop-shadow(0 0 7px var(--blue-d));}
    .nav-pub i{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#a83800);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.98rem;color:#fff;box-shadow:0 4px 16px var(--accent-glow);margin-bottom:.1rem;}
    .nav-pub{color:var(--text-2);margin-top:-10px;}

    /* ── TOAST ── */
    #toast{position:fixed;bottom:calc(var(--nav-h)+1rem);left:50%;transform:translateX(-50%) translateY(60px);opacity:0;background:var(--card);border:1px solid var(--border-md);color:var(--text);padding:.75rem 1.4rem;border-radius:100px;font-size:.85rem;display:flex;align-items:center;gap:.55rem;box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:9999;transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .3s;white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    #toast.success i{color:#4caf7d;}#toast.info i{color:var(--gold);}#toast.error i{color:#e05252;}
    </style>
</head>
<body>
<script src="app.js"></script>
<script src="tmn-api.js"></script>

<header class="top-header">
    <div class="hdr-logo"><span>TOP</span> Niger</div>
    <div class="search-wrap">
        <i class="fas fa-search s-ico"></i>
        <input class="search-inp" id="searchInp"
               placeholder="Morceau, artiste, genre, région…"
               oninput="onSearch(this.value)" onfocus="onFocus()" autocomplete="off">
        <span class="s-clear" id="sClear" onclick="clearSearch()"><i class="fas fa-xmark"></i></span>
    </div>
</header>

<main class="main">

    <!-- ══ DEFAULT STATE ══ -->
    <div id="stateDefault">

        <!-- Trending marquee -->
        <div class="marquee-wrap">
            <div class="marquee-inner" id="marqueeInner"></div>
        </div>

        <!-- Catégories -->
        <div class="section">
            <div class="sec-head"><h2 class="sec-title"><i class="fas fa-compass"></i> Explorer par catégorie</h2></div>
            <div class="cat-grid" id="catGrid"></div>
        </div>

        <!-- Régions -->
        <div class="section">
            <div class="sec-head"><h2 class="sec-title"><i class="fas fa-map-marker-alt"></i> Régions du Niger</h2></div>
            <div class="h-scroll" id="regionRow"></div>
        </div>

        <!-- Historique de recherche -->
        <div class="section" id="historySection">
            <div class="sec-head">
                <h2 class="sec-title"><i class="fas fa-clock-rotate-left"></i> Recherches récentes</h2>
                <span class="sec-link" onclick="clearHistory()"><i class="fas fa-trash-can" style="font-size:.65rem;"></i> Effacer</span>
            </div>
            <div class="hist-list" id="histList"></div>
        </div>

        <!-- Recherches populaires -->
        <div class="section">
            <div class="sec-head"><h2 class="sec-title"><i class="fas fa-fire"></i> Tendances de recherche</h2></div>
            <div class="search-chips" id="trendChips"></div>
        </div>

    </div>

    <!-- ══ RESULTS STATE ══ -->
    <div id="stateResults">
        <div class="filters-bar" id="filtersBar"></div>
        <div class="sort-row">
            <span class="sort-count" id="sortCount">— résultats</span>
            <select class="sort-select" id="sortSelect" onchange="applySort()">
                <option value="relevance">Pertinence</option>
                <option value="plays">Plus écoutés</option>
                <option value="rating">Mieux notés</option>
                <option value="recent">Plus récents</option>
            </select>
        </div>
        <div class="result-list" id="resultList"></div>
    </div>

    <!-- ══ EMPTY STATE ══ -->
    <div id="stateEmpty">
        <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">Aucun résultat</div>
            <div class="empty-sub" id="emptyMsg">Aucun résultat pour votre recherche.<br>Essayez d'autres mots-clés.</div>
        </div>
    </div>

</main>

<!-- Mini player -->
<div class="mini-player" id="miniPlayer">
    <div class="mp-inner">
        <div class="mp-cov"><div class="mp-cov-bg" id="mpBg"></div><span class="mp-cov-em" id="mpEm">🎵</span></div>
        <div class="mp-info"><div class="mp-title" id="mpTitle">—</div><div class="mp-artist" id="mpArtist">—</div></div>
        <div class="mp-ctrl">
            <div class="mp-btn" onclick="playerPrev()"><i class="fas fa-backward-step"></i></div>
            <div class="mp-play-btn" id="mpPlay" onclick="togglePlay()"><i class="fas fa-play"></i></div>
            <div class="mp-btn" onclick="playerNext()"><i class="fas fa-forward-step"></i></div>
        </div>
    </div>
    <div class="mp-prog" onclick="seekProg(event)"><div class="mp-fill" id="mpFill"></div></div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>

<div id="toast"><i class="fas fa-circle-info"></i><span id="toastMsg"></span></div>

<script>
/* ══ DATA ══ */
const SONGS = [
    {id:1, type:'song', title:'SARAOUNA',      artist:'FATOUMATA', genre:'Afrobeat', region:'Niamey',   emoji:'🎵', plays:'128k', playsN:128000, rating:4.9, year:2025},
    {id:2, type:'song', title:'ZINDER RISE',   artist:'BOUBACAR',  genre:'Rap',      region:'Zinder',   emoji:'🎤', plays:'98k',  playsN:98000,  rating:4.8, year:2025},

const ARTISTS = [
    {id:101,type:'artist',title:'FATOUMATA', sub:'Afrobeat · Niamey',  emoji:'F', color:'#e0530c', plays:'456k', playsN:456000, rating:4.9, year:2020},
    {id:102,type:'artist',title:'MAMANE',    sub:'Rap · Niamey',       emoji:'M', color:'#0c7e40', plays:'312k', playsN:312000, rating:4.8, year:2019},
    {id:103,type:'artist',title:'AMINATOU',  sub:'R&B · Tahoua',       emoji:'A', color:'#c9a84c', plays:'287k', playsN:287000, rating:4.7, year:2021},
    {id:104,type:'artist',title:'BOUBACAR',  sub:'Rap · Zinder',       emoji:'B', color:'#5b8dee', plays:'254k', playsN:254000, rating:4.8, year:2018},
    {id:105,type:'artist',title:'RABIATOU',  sub:'Gospel · Agadez',    emoji:'R', color:'#9c27b0', plays:'198k', playsN:198000, rating:4.7, year:2022},
    {id:106,type:'artist',title:'IBRAHIM',   sub:'Mandé · Maradi',     emoji:'I', color:'#00838f', plays:'176k', playsN:176000, rating:4.5, year:2021},
];

const GENRES_DATA = [
    {id:201,type:'genre',title:'Rap',      sub:'28 morceaux', emoji:'🎤', grad:'linear-gradient(135deg,#e0530c,#a83000)'},
    {id:202,type:'genre',title:'Afrobeat', sub:'22 morceaux', emoji:'🥁', grad:'linear-gradient(135deg,#c9a84c,#7a6020)'},
    {id:203,type:'genre',title:'Gospel',   sub:'14 morceaux', emoji:'🙏', grad:'linear-gradient(135deg,#0c7e40,#064020)'},
    {id:204,type:'genre',title:'R&B',      sub:'11 morceaux', emoji:'🎶', grad:'linear-gradient(135deg,#5b8dee,#2a4ea0)'},
    {id:205,type:'genre',title:'Zouk',     sub:'8 morceaux',  emoji:'💃', grad:'linear-gradient(135deg,#9c27b0,#5a1070)'},
    {id:206,type:'genre',title:'Mandé',    sub:'7 morceaux',  emoji:'🪗', grad:'linear-gradient(135deg,#00838f,#004050)'},
];

const REGIONS_LIST = [
    {name:'Niamey',    icon:'🏙️', count:124},
    {name:'Zinder',    icon:'🏰', count:87 },
    {name:'Maradi',    icon:'🌾', count:73 },
    {name:'Agadez',    icon:'🏜️', count:61 },
    {name:'Tahoua',    icon:'🌿', count:54 },
    {name:'Dosso',     icon:'🌊', count:48 },
    {name:'Tillabéri', icon:'🌴', count:42 },
    {name:'Diffa',     icon:'🐪', count:35 },
];

const TREND_SEARCHES = [
    {q:'SARAOUNA',   hot:true},{q:'Rap Zinder',hot:true},{q:'MAMANE',hot:false},
    {q:'Gospel Niger',hot:false},{q:'Afrobeat 2025',hot:true},{q:'AMINATOU',hot:false},
    {q:'Zouk',hot:false},{q:'Haoussa music',hot:false},{q:'BOUBACAR',hot:true},
];

const ALL_DATA = [...SONGS, ...ARTISTS, ...GENRES_DATA];

/* ══ STATE ══ */
const $=id=>document.getElementById(id);
let currentSong=null,isPlaying=false,progress=0,progTimer=null;
let searchHistory=JSON.parse(localStorage.getItem('tmn_search_hist')||'[]');
let activeFilter='all';
let lastQuery='';

/* ══ INIT ══ */
document.addEventListener('DOMContentLoaded', async () => {
    buildMarquee(); buildCatGrid(); buildRegionRow();
    renderHistory(); renderTrendChips();

    // Enrichir avec données API
    try {
        const topData = await TMNAPI.top.weekly();
        if (topData.data?.length) {
            // Remplacer les songs mock par les vraies données
            const apiSongs = topData.data.map(s => ({
                id: s.id, title: s.title, artist: s.artist_name||'Artiste',
                genre: s.genre, region: s.region, emoji: s.emoji||'🎵',
                plays: s.play_count||0, rating: s.avg_rating||0,
                type: 'song', color: '#c9a84c',
            }));
            SONGS.length = 0;
            apiSongs.forEach(s => SONGS.push(s));
            // Rafraîchir le marquee avec vraies données
            const inner = document.getElementById('marqueeInner');
            if (inner) {
                inner.innerHTML = '';
                [...apiSongs, ...apiSongs].forEach(s => {
                    const el = document.createElement('span');
                    el.className = 'mq-item';
                    el.innerHTML = `<i class="fas fa-fire"></i>${s.title} – ${s.artist}`;
                    el.onclick = () => playSong(s);
                    inner.appendChild(el);
                });
            }
        }

        // Counts réels par genre et région
        const [genreData, regionData] = await Promise.all([
            TMNAPI.top.byGenre(),
            TMNAPI.top.byRegion(),
        ]);
        if (genreData.data) {
            CATS.forEach(cat => {
                const songs = genreData.data[cat.filter] || [];
                cat.sub = songs.length + ' morceau' + (songs.length > 1 ? 'x' : '');
            });
            buildCatGrid();
        }
        if (regionData.data) {
            REGIONS_LIST.forEach(r => {
                const songs = regionData.data[r.name] || [];
                r.count = songs.length + ' morceaux';
            });
            buildRegionRow();
        }
    } catch(e) {}
});

/* ══ MARQUEE ══ */
function buildMarquee(){
    const inner=$('marqueeInner');
    const items=[...SONGS.slice(0,8),...SONGS.slice(0,8)];// duplicate for seamless loop
    items.forEach(s=>{
        const el=document.createElement('span');
        el.className='mq-item';
        el.innerHTML=`<i class="fas fa-fire"></i>${s.title} – ${s.artist}`;
        el.onclick=()=>playSong(s);
        inner.appendChild(el);
    });
}

/* ══ CATEGORIES ══ */
const CATS = [
    {label:'Rap',     sub:'28 morceaux', deco:'🎤', grad:'linear-gradient(135deg,#e0530c 0%,#7a1800 100%)', filter:'Rap'},
    {label:'Afrobeat',sub:'22 morceaux', deco:'🥁', grad:'linear-gradient(135deg,#c9a84c 0%,#6a4a00 100%)', filter:'Afrobeat'},
    {label:'Gospel',  sub:'14 morceaux', deco:'🙏', grad:'linear-gradient(135deg,#0c7e40 0%,#033018 100%)', filter:'Gospel'},
    {label:'R&B',     sub:'11 morceaux', deco:'🎶', grad:'linear-gradient(135deg,#5b8dee 0%,#1a3a80 100%)', filter:'R&B'},
    {label:'Zouk',    sub:'8 morceaux',  deco:'💃', grad:'linear-gradient(135deg,#9c27b0 0%,#400060 100%)', filter:'Zouk'},
    {label:'Mandé',   sub:'7 morceaux',  deco:'🪗', grad:'linear-gradient(135deg,#00838f 0%,#003040 100%)', filter:'Mandé'},
];
function buildCatGrid(){
    const grid=$('catGrid'); grid.innerHTML='';
    CATS.forEach(c=>{
        const card=document.createElement('div');
        card.className='cat-card';
        card.style.background=c.grad;
        card.innerHTML=`<div class="cat-card-deco">${c.deco}</div><div class="cat-card-label">${c.label}</div><div class="cat-card-sub">${c.sub}</div>`;
        card.onclick=()=>{$('searchInp').value=c.label;onSearch(c.label);};
        grid.appendChild(card);
    });
}

/* ══ REGIONS ══ */
function buildRegionRow(){
    const row=$('regionRow');
    REGIONS_LIST.forEach(r=>{
        const chip=document.createElement('div');
        chip.className='region-chip';
        chip.innerHTML=`<span>${r.icon}</span><span>${r.name}</span><span style="font-size:.64rem;color:var(--text-3);">${r.count}</span>`;
        chip.onclick=()=>{$('searchInp').value=r.name;onSearch(r.name);};
        row.appendChild(chip);
    });
}

/* ══ HISTORY ══ */
function renderHistory(){
    const list=$('histList');list.innerHTML='';
    const sec=$('historySection');
    if(!searchHistory.length){sec.style.display='none';return;}
    sec.style.display='';
    searchHistory.slice(0,6).forEach((q,i)=>{
        const el=document.createElement('div');el.className='hist-item';
        el.innerHTML=`<div class="hist-icon"><i class="fas fa-clock-rotate-left"></i></div><span class="hist-text">${q}</span><span class="hist-del" onclick="removeHistory(${i},event)"><i class="fas fa-xmark"></i></span>`;
        el.addEventListener('click',e=>{if(!e.target.closest('.hist-del')){$('searchInp').value=q;onSearch(q);}});
        list.appendChild(el);
    });
}
function removeHistory(i,e){e.stopPropagation();searchHistory.splice(i,1);localStorage.setItem('tmn_search_hist',JSON.stringify(searchHistory));renderHistory();}
function clearHistory(){searchHistory=[];localStorage.setItem('tmn_search_hist',JSON.stringify(searchHistory));renderHistory();showToast('Historique effacé','info');}
function addHistory(q){if(!q)return;searchHistory=searchHistory.filter(x=>x!==q);searchHistory.unshift(q);if(searchHistory.length>10)searchHistory.pop();localStorage.setItem('tmn_search_hist',JSON.stringify(searchHistory));}

/* ══ TREND CHIPS ══ */
function renderTrendChips(){
    const wrap=$('trendChips');wrap.innerHTML='';
    TREND_SEARCHES.forEach(t=>{
        const chip=document.createElement('span');
        chip.className=`sch${t.hot?' trending':''}`;
        chip.innerHTML=`${t.hot?'<i class="fas fa-fire" style="font-size:.65rem;margin-right:.25rem;"></i>':''}${t.q}`;
        chip.onclick=()=>{$('searchInp').value=t.q;onSearch(t.q);};
        wrap.appendChild(chip);
    });
}

/* ══ SEARCH LOGIC ══ */
function onFocus(){
    // Show default state when empty
    if(!$('searchInp').value){setState('default');}
}

function onSearch(q){
    $('sClear').classList.toggle('show',!!q.trim());
    if(!q.trim()){setState('default');lastQuery='';return;}
    lastQuery=q;
    const results=doSearch(q,activeFilter);
    if(!results.length){
        $('emptyMsg').innerHTML=`Aucun résultat pour « <strong>${q}</strong> ».<br>Essayez d'autres mots-clés.`;
        setState('empty');return;
    }
    buildFilters(q); renderResults(results,q); setState('results');
}

function doSearch(q,filter='all'){
    const lq=q.toLowerCase();
    return ALL_DATA.filter(item=>{
        const matchType = filter==='all' || item.type===filter ||
            (filter==='song'   && item.type==='song')   ||
            (filter==='artist' && item.type==='artist') ||
            (filter==='genre'  && item.type==='genre');
        if(!matchType)return false;
        return (
            item.title?.toLowerCase().includes(lq) ||
            item.artist?.toLowerCase().includes(lq) ||
            item.genre?.toLowerCase().includes(lq)  ||
            item.region?.toLowerCase().includes(lq) ||
            item.sub?.toLowerCase().includes(lq)
        );
    });
}

function buildFilters(q){
    const bar=$('filtersBar');bar.innerHTML='';
    const counts={all:doSearch(q,'all').length, song:doSearch(q,'song').length, artist:doSearch(q,'artist').length, genre:doSearch(q,'genre').length};
    const tabs=[
        {key:'all',    label:'Tous',     icon:'fa-search'},
        {key:'song',   label:'Morceaux', icon:'fa-music' },
        {key:'artist', label:'Artistes', icon:'fa-microphone'},
        {key:'genre',  label:'Genres',   icon:'fa-tag'},
    ];
    tabs.forEach(t=>{
        if(counts[t.key]===0&&t.key!=='all')return;
        const btn=document.createElement('div');
        btn.className=`filter-btn${t.key===activeFilter?' active':''}`;
        btn.innerHTML=`<i class="fas ${t.icon}" style="font-size:.7rem;margin-right:.28rem;"></i>${t.label}${counts[t.key]>0?' ('+counts[t.key]+')':''}`;
        btn.onclick=()=>{activeFilter=t.key;bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');onSearch(lastQuery);};
        bar.appendChild(btn);
    });
}

function applySort(){
    if(!lastQuery)return;
    const results=doSearch(lastQuery,activeFilter);
    const sort=$('sortSelect').value;
    if(sort==='plays')results.sort((a,b)=>(b.playsN||0)-(a.playsN||0));
    else if(sort==='rating')results.sort((a,b)=>(b.rating||0)-(a.rating||0));
    else if(sort==='recent')results.sort((a,b)=>(b.year||0)-(a.year||0));
    renderResults(results,lastQuery);
}

function renderResults(results,q){
    const list=$('resultList');list.innerHTML='';
    $('sortCount').textContent=`${results.length} résultat${results.length>1?'s':''}`;
    addHistory(q);
    results.forEach((item,i)=>{
        const el=document.createElement('div');
        el.className='res-item';
        el.style.animationDelay=(i*0.04)+'s';
        const stars=item.rating?Array.from({length:5},(_,j)=>`<i class="fas fa-star${j<Math.floor(item.rating)?'':' e'}"></i>`).join(''):'';
        const typeLabel={song:'Morceau',artist:'Artiste',genre:'Genre',region:'Région'}[item.type]||item.type;

        let coverHtml='';
        if(item.type==='artist'){
            coverHtml=`<div class="ri-type artist" style="background:${item.color||'linear-gradient(135deg,#e0530c,#a83800)'}"><span style="font-family:Syne,sans-serif;font-size:1.2rem;font-weight:800;color:#fff;position:relative;z-index:1;">${item.emoji}</span></div>`;
        } else {
            coverHtml=`<div class="ri-type ${item.type}"><div class="ri-bg">${item.emoji}</div><div class="ri-em">${item.emoji}</div></div>`;
        }

        const hl=txt=>txt.replace(new RegExp('('+escapeRe(q)+')','gi'),'<mark>$1</mark>');
        const titleHl=hl(item.title||'');
        const subTxt=item.artist?`${hl(item.artist)} · ${item.genre||''} · ${item.region||''}`:item.sub||'';

        el.innerHTML=`
            ${coverHtml}
            <div class="ri-info">
                <div class="ri-title">${titleHl}</div>
                <div class="ri-sub">
                    <span class="ri-tag ${item.type}">${typeLabel}</span>
                    <span>${subTxt}</span>
                </div>
            </div>
            <div class="ri-right">
                ${stars?`<div class="ri-stars">${stars}</div>`:''}
                ${item.plays?`<span class="ri-plays"><i class="fas fa-headphones" style="font-size:.58rem;margin-right:.15rem;"></i>${item.plays}</span>`:''}
                ${item.type==='song'?`<div class="ri-play" onclick="event.stopPropagation();playSong(SONGS.find(s=>s.id===${item.id})||SONGS[0])"><i class="fas fa-play"></i></div>`:''}
            </div>`;
        el.addEventListener('click',()=>{
            if(item.type==='song') playSong(SONGS.find(s=>s.id===item.id)||SONGS[0]);
            else if(item.type==='artist') showToast(`Profil de ${item.title}`,'info');
            else showToast(`Genre : ${item.title}`,'info');
        });
        list.appendChild(el);
    });
}

function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

function clearSearch(){$('searchInp').value='';$('sClear').classList.remove('show');activeFilter='all';lastQuery='';setState('default');}

function setState(s){
    $('stateDefault').style.display=s==='default'?'':'none';
    $('stateResults').style.display=s==='results'?'':'none';
    $('stateEmpty').style.display=s==='empty'?'':'none';
}

/* ══ PLAYER ══ */
function playSong(song){
    if(!song)return;
    currentSong=song;isPlaying=true;progress=0;
    $('mpEm').textContent=song.emoji;$('mpBg').textContent=song.emoji;
    $('mpTitle').textContent=song.title;$('mpArtist').textContent=song.artist;
    $('mpPlay').innerHTML='<i class="fas fa-pause"></i>';
    $('miniPlayer').classList.add('show');$('mpFill').style.width='0%';
    clearInterval(progTimer);startProg();
}
function startProg(){
    if(!currentSong||!isPlaying)return;
    const dur=210+Math.floor(Math.random()*120);
    progTimer=setInterval(()=>{
        if(!isPlaying)return;progress++;
        $('mpFill').style.width=((progress/dur)*100)+'%';
        if(progress>=dur)playerNext();
    },1000);
}
function togglePlay(){
    if(!currentSong){if(SONGS.length)playSong(SONGS[0]);return;}
    isPlaying=!isPlaying;
    $('mpPlay').innerHTML=isPlaying?'<i class="fas fa-pause"></i>':'<i class="fas fa-play"></i>';
    if(isPlaying)startProg();else clearInterval(progTimer);
}
function playerPrev(){if(!currentSong)return;const i=SONGS.findIndex(s=>s.id===currentSong.id);playSong(SONGS[Math.max(0,i-1)]);}
function playerNext(){clearInterval(progTimer);const i=currentSong?SONGS.findIndex(s=>s.id===currentSong.id):-1;playSong(SONGS[(i+1)%SONGS.length]);}
function seekProg(e){if(!currentSong)return;const pct=(e.clientX-e.currentTarget.getBoundingClientRect().left)/e.currentTarget.offsetWidth;const dur=210;progress=Math.floor(dur*pct);$('mpFill').style.width=(pct*100)+'%';}

function goProfile(e){e.preventDefault();const u=JSON.parse(localStorage.getItem('tmn_user')||'null');window.location.href=(u?.musicType)?'profil-artiste.html':'profil-auditeur.html';}

/* ══ TOAST ══ */
function showToast(msg,type='info'){
    const t=$('toast');$('toastMsg').textContent=msg;
    t.querySelector('i').className=type==='success'?'fas fa-circle-check':type==='error'?'fas fa-circle-xmark':'fas fa-circle-info';
    t.className=`show ${type}`;clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3200);
}

TMN.init({requireAuth: false, activeNav: 'profile' });
</script>
